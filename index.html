<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NexSphere - Premium Social Workspace</title>
    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" rel="stylesheet">
    
    <style>
        /* ==========================================
           1. CSS VARIABLES & THEMES (MD3 & GLASS)
           ========================================== */
        :root {
            --font-main: 'Plus Jakarta Sans', sans-serif;
            
            /* Light Theme Palette */
            --bg-primary: #f4f6fa;
            --bg-surface: rgba(255, 255, 255, 0.75);
            --bg-surface-hover: rgba(255, 255, 255, 0.9);
            --border-color: rgba(226, 232, 240, 0.8);
            --text-main: #1e293b;
            --text-muted: #64748b;
            
            /* Brand Colors (MD3 Accent) */
            --primary: #4f46e5;
            --primary-state: rgba(79, 70, 229, 0.08);
            --primary-container: #e0e7ff;
            --secondary: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #6366f1;
            
            /* Glassmorphism Specs */
            --blur-radius: 16px;
            --shadow-sm: 0 2px 8px -2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 12px 24px -4px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 32px -8px rgba(0, 0, 0, 0.12);
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-round: 9999px;
            
            /* Dynamic Layout Metrics */
            --header-height: 70px;
            --sidebar-width: 260px;
            --bottom-nav-height: 75px;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-primary: #0b0f19;
            --bg-surface: rgba(23, 29, 43, 0.75);
            --bg-surface-hover: rgba(30, 41, 59, 0.9);
            --border-color: rgba(51, 65, 85, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #818cf8;
            --primary-state: rgba(129, 140, 248, 0.15);
            --primary-container: #312e81;
            --shadow-sm: 0 2px 8px -2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 12px 24px -4px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 20px 32px -8px rgba(0, 0, 0, 0.6);
        }

        /* ==========================================
           2. RESET & BASE STYLES
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.3s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        input, textarea, select, button {
            font-family: inherit;
            color: inherit;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: var(--radius-round);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* ==========================================
           3. MASTER LAYOUT ARCHITECTURE
           ========================================== */
        #app-layout {
            display: grid;
            grid-template-areas: 
                "header header"
                "sidebar content"
                "footer footer";
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: var(--header-height) 1fr auto;
            min-height: 100vh;
        }

        #app-layout.sidebar-collapsed {
            --sidebar-width: 80px;
        }

        /* Header Style */
        .app-header {
            grid-area: header;
            background: var(--bg-surface);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            z-index: 1000;
            box-shadow: var(--shadow-sm);
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        .brand-name {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: var(--transition-smooth);
        }

        #app-layout.sidebar-collapsed .brand-name {
            opacity: 0;
            width: 0;
            pointer-events: none;
        }

        /* Search Box Component */
        .search-container {
            position: relative;
            width: clamp(200px, 30vw, 400px);
        }

        .search-input {
            width: 100%;
            padding: 10px 16px 10px 44px;
            border-radius: var(--radius-round);
            border: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.02);
            outline: none;
            transition: var(--transition-smooth);
        }

        [data-theme="dark"] .search-input {
            background: rgba(255, 255, 255, 0.02);
        }

        .search-input:focus {
            border-color: var(--primary);
            background: var(--bg-surface-hover);
            box-shadow: 0 0 0 3px var(--primary-state);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        /* Live Clock & Meta widget */
        .meta-clock-widget {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-right: 1px solid var(--border-color);
            padding-right: 16px;
        }

        .meta-time {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Control Shell Icon Action */
        .icon-action-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-round);
            border: none;
            background: transparent;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: var(--transition-smooth);
        }

        .icon-action-btn:hover {
            background: var(--primary-state);
            color: var(--primary);
        }

        .icon-action-btn .badge-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: var(--radius-round);
            border: 2px solid var(--bg-surface);
        }

        /* Sidebar Navigation Architecture */
        .app-sidebar {
            grid-area: sidebar;
            background: var(--bg-surface);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border-right: 1px solid var(--border-color);
            position: fixed;
            top: var(--header-height);
            left: 0;
            bottom: 0;
            width: var(--sidebar-width);
            z-index: 999;
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px 0;
            box-shadow: var(--shadow-sm);
        }

        .sidebar-menu-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0 12px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition-smooth);
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .menu-item:hover {
            background: var(--primary-state);
            color: var(--primary);
        }

        .menu-item.active {
            background: var(--primary);
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .menu-text {
            white-space: nowrap;
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        #app-layout.sidebar-collapsed .menu-text {
            opacity: 0;
            width: 0;
            pointer-events: none;
        }

        /* User Profile Summary Sidebar */
        .sidebar-user-card {
            margin: 0 12px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border-color);
        }

        [data-theme="dark"] .sidebar-user-card {
            background: rgba(255, 255, 255, 0.02);
        }

        .avatar-frame {
            position: relative;
            width: 44px;
            height: 44px;
            border-radius: var(--radius-round);
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            padding: 2px;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: var(--radius-round);
            object-fit: cover;
            background: var(--bg-primary);
        }

        .user-meta-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .user-display-name {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }

        .user-role-lbl {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        #app-layout.sidebar-collapsed .sidebar-user-card {
            padding: 8px;
            justify-content: center;
        }
        #app-layout.sidebar-collapsed .user-meta-info {
            display: none;
        }

        /* Main Workspace Area */
        .app-content {
            grid-area: content;
            margin-top: var(--header-height);
            margin-left: var(--sidebar-width);
            padding: 32px;
            min-height: calc(100vh - var(--header-height) - 60px);
            transition: var(--transition-smooth);
        }

        #app-layout.sidebar-collapsed .app-content {
            margin-left: var(--sidebar-width);
        }

        /* Footer Structure */
        .app-footer {
            grid-area: footer;
            background: var(--bg-surface);
            border-top: 1px solid var(--border-color);
            margin-left: var(--sidebar-width);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            transition: var(--transition-smooth);
        }
        
        #app-layout.sidebar-collapsed .app-footer {
            margin-left: var(--sidebar-width);
        }

        .network-status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: var(--radius-round);
            background: var(--success);
        }
        .status-dot.offline {
            background: var(--danger);
        }

        /* Bottom Nav (Mobile Only) */
        .bottom-nav {
            display: none;
        }

        /* ==========================================
           4. SYSTEM WORKSPACE GRAPHICS & VIEWS
           ========================================== */
        .view-container {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Grid Layout Modules */
        .grid-dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        /* Premium Components: Cards */
        .premium-card {
            background: var(--bg-surface);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition-smooth);
            position: relative;
            margin-bottom: 24px;
        }

        .premium-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: rgba(79, 70, 229, 0.2);
        }

        .welcome-gradient-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
        }
        .welcome-gradient-card * { color: white !important; }

        /* Stats Blocks */
        .stats-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-box {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .stat-icon-wrapper {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        /* Social Media Feeds: Feed Card Engine */
        .post-composer-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .composer-textarea {
            width: 100%;
            min-height: 100px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: rgba(0,0,0,0.01);
            padding: 16px;
            resize: none;
            outline: none;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }
        .composer-textarea:focus {
            border-color: var(--primary);
            background: var(--bg-surface-hover);
        }

        .post-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .post-author-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .post-content-body {
            font-size: 0.98rem;
            line-height: 1.6;
            margin-bottom: 16px;
            white-space: pre-wrap;
        }
        .post-media-attachment {
            width: 100%;
            max-height: 380px;
            border-radius: var(--radius-md);
            object-fit: cover;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }
        .post-actions-bar {
            display: flex;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 0;
            margin-bottom: 16px;
            gap: 8px;
        }
        .action-trigger-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.88rem;
            font-weight: 500;
            transition: var(--transition-smooth);
        }
        .action-trigger-btn:hover {
            background: var(--primary-state);
            color: var(--primary);
        }
        .action-trigger-btn.active-liked {
            color: var(--danger);
        }

        /* Comments Engine Architecture */
        .comments-section {
            background: rgba(0, 0, 0, 0.01);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .comment-node {
            display: flex;
            gap: 12px;
            font-size: 0.88rem;
        }
        .comment-bubble {
            background: var(--bg-surface-hover);
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            border-radius: 0 var(--radius-md) var(--radius-md) var(--radius-md);
            flex: 1;
        }

        /* Realtime Chat Workspace Engine */
        .chat-module-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-surface);
            height: calc(100vh - var(--header-height) - 140px);
            overflow: hidden;
        }
        .chat-channels-list {
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .channel-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: var(--transition-smooth);
        }
        .channel-row:hover, .channel-row.active {
            background: var(--primary-state);
        }
        .chat-viewport {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.01);
        }
        .chat-messages-stream {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .msg-packet {
            display: flex;
            flex-direction: column;
            max-width: 65%;
            gap: 4px;
        }
        .msg-packet.incoming {
            align-self: flex-start;
        }
        .msg-packet.outgoing {
            align-self: flex-end;
            align-items: flex-end;
        }
        .msg-payload {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 0.92rem;
            box-shadow: var(--shadow-sm);
        }
        .incoming .msg-payload {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 0 var(--radius-md) var(--radius-md) var(--radius-md);
        }
        .outgoing .msg-payload {
            background: var(--primary);
            color: white;
            border-radius: var(--radius-md) 0 var(--radius-md) var(--radius-md);
        }
        .msg-timestamp {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .chat-composer-strip {
            padding: 16px 24px;
            background: var(--bg-surface);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* Form Controls Elements styling */
        .form-group-floating {
            position: relative;
            margin-bottom: 20px;
        }
        .form-control-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: transparent;
            outline: none;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }
        .form-control-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-state);
        }
        
        /* Buttons Master Suite Styling & Ripple effects base */
        .btn-suite {
            padding: 10px 20px;
            border-radius: var(--radius-md);
            border: none;
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: rgba(0,0,0,0.05); color: var(--text-main); }
        [data-theme="dark"] .btn-secondary { background: rgba(255,255,255,0.05); }
        .btn-danger { background: var(--danger); color: white; }
        
        /* Modern Data Table System */
        .table-panel-holder {
            width: 100%;
            overflow-x: auto;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }
        .premium-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }
        .premium-table th {
            background: rgba(0,0,0,0.02);
            padding: 14px 16px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border-color);
        }
        [data-theme="dark"] .premium-table th { background: rgba(255,255,255,0.02); }
        .premium-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .premium-table tr:last-child td { border-bottom: none; }
        .premium-table tr:hover td { background: var(--primary-state); }

        /* Dialog / Modal Shell Layer */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition-smooth);
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-sheet-box {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 500px;
            padding: 28px;
            box-shadow: var(--shadow-lg);
            transform: scale(0.95);
            transition: var(--transition-smooth);
        }
        .modal-overlay.active .modal-sheet-box {
            transform: scale(1);
        }

        /* Toast Alert Container Component */
        #toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }
        .toast-node {
            background: var(--bg-surface);
            border-left: 4px solid var(--primary);
            box-shadow: var(--shadow-lg);
            padding: 16px 20px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 280px;
            pointer-events: auto;
            animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: var(--radius-round);
            transform: scale(0);
            animation: ripple-anim 0.6s linear;
            pointer-events: none;
        }
        @keyframes ripple-anim {
            to { transform: scale(4); opacity: 0; }
        }

        /* ==========================================
           5. MEDIA QUERIES (RESPONSIVENESS HUB)
           ========================================== */
        @media (max-width: 992px) {
            #app-layout {
                grid-template-columns: 80px 1fr;

            .app-sidebar {
                width: 80px;
            }
            .brand-name, .menu-text, .user-meta-info {

                grid-template-areas: 
                    "header header"
                    "content content";
                grid-template-columns: 1fr;
            }
            .app-sidebar, .app-footer {

            }
            .app-content {

            .bottom-nav {

                position: fixed;

                                            <li style="border-bottom:1px solid var(--border-color); padding-bottom:6px;">INV-00892 - Rp 4.500.000 <span style="color:var(--success);">Sukses</span></li>
                                            <li style="border-bottom:1px solid var(--border-color); padding-bottom:6px;">INV-00891 - Rp 9.000.000 <span style="color:var(--success);">Sukses</span></li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        `;
                    },
                    'laporan-sys'() {
                        return `
                            <div class="premium-card">
                                <h2>Pelaporan Keuangan & Absensi Kehadiran Karyawan</h2>
                                <p style="color:var(--text-muted); margin-bottom:20px;">Laporan konsolidasi otomatis terstruktur bulanan sistem ERP</p>
                                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:20px;">
                                    <div style="border:1px solid var(--border-color); padding:16px; border-radius:var(--radius-md);">
                                        <h4>Log Presensi Kehadiran Tim</h4>
                                        <p style="font-size:2rem; font-weight:700; margin:10px 0;">98.4%</p>
                                        <span style="color:var(--success); font-size:0.8rem; font-weight:600;">Status Sangat Bagus Terjaga</span>
                                    </div>
                                    <div style="border:1px solid var(--border-color); padding:16px; border-radius:var(--radius-md);">
                                        <h4>Kas Finansial Keluar Masuk</h4>
                                        <p style="font-size:2rem; font-weight:700; margin:10px 0; color:var(--secondary);">Rp 124,5M</p>
                                        <span style="color:var(--text-muted); font-size:0.8rem;">Sinkronisasi Otomatis Supabase Cloud</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    },
                    'pengaturan-app'() {
                        return `
                            <div class="premium-card" style="max-width:600px;">
                                <h2>Pengaturan Dasar Profil & Aplikasi</h2>
                                <div style="margin-top:20px; display:flex; flex-direction:column; gap:16px;">
                                    <div class="form-group-floating">
                                        <label style="font-size:0.85rem; color:var(--text-muted); display:block; margin-bottom:6px;">Ganti Nama Operator Default System</label>
                                        <input type="text" class="form-control-input" id="setting-username-field" value="${localStorage.getItem('ns_username') || 'Kartika Dewi'}">
                                    </div>
                                    <div>
                                        <button class="btn-suite btn-primary" onclick="App.SettingsEngine.saveGlobalConfig()">Simpan Konfigurasi</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                },

                // Active Execution Code Block per View Lifecycle Hooks
                viewHooks: {
                    dashboard() {
                        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
                        const target = document.getElementById('dash-day-name');
                        if (target) target.innerText = days[new Date().getDay()];
                    },
                    'social-feed'() {
                        App.FeedEngine.renderStream();
                    },
                    'chat-room'() {
                        App.ChatEngine.renderChatStream();
                    }
                }
            },

            // Navigation Renderer & Core Responsive Drawer Engine Matrix
            Navigation: {
                render() {
                    const sideTarget = document.getElementById('sidebar-menu-injector');
                    const bottomTarget = document.getElementById('bottom-nav-injector');
                    
                    let sideHtml = '';
                    let bottomHtml = '';
                    
                    AppNavigationMatrix.forEach(menu => {
                        const itemHtml = `
                            <a class="menu-item" data-view-target="${menu.id}" onclick="App.Router.navigate('${menu.id}')">
                                <span class="material-symbols-outlined">${menu.icon}</span>
                                <span class="menu-text">${menu.label}</span>
                            </a>
                        `;
                        sideHtml += itemHtml;
                        
                        // Pick first 4 parameters matrix metrics items for bottom navigation context mobile viewports
                        if(['dashboard', 'social-feed', 'chat-room', 'pengaturan-app'].includes(menu.id)) {
                            bottomHtml += `
                                <a class="bottom-nav-item" data-view-target="${menu.id}" onclick="App.Router.navigate('${menu.id}')">
                                    <div class="material-symbols-out-frame">
                                        <span class="material-symbols-outlined">${menu.icon}</span>
                                    </div>
                                    <span>${menu.label}</span>
                                </a>
                            `;
                        }
                    });
                    
                    sideTarget.innerHTML = sideHtml;
                    bottomTarget.innerHTML = bottomHtml;
                }
            },

            // Live Realtime Clock-Calendar Metadata Synchronization Service Layer
            Clock: {
                start() {
                    const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
                    const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
                    
                    setInterval(() => {
                        const now = new Date();
                        
                        // String builder formatter clock digits
                        const hrs = String(now.getHours()).padStart(2, '0');
                        const mins = String(now.getMinutes()).padStart(2, '0');
                        const secs = String(now.getSeconds()).padStart(2, '0');
                        
                        const dateStr = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
                        
                        document.getElementById('live-date-str').innerText = dateStr;
                        document.getElementById('live-clock-str').innerText = `${hrs}:${mins}:${secs} WIB`;
                        document.getElementById('footer-year-sync').innerText = now.getFullYear();
                    }, 1000);
                }
            },

            // Adaptive Dark Mode Storage Interface State Handler
            Theme: {
                init() {
                    const saved = localStorage.getItem('ns_theme') || 'light';
                    document.documentElement.setAttribute('data-theme', saved);
                    this.updateIcon(saved);
                },
                toggle() {
                    const current = document.documentElement.getAttribute('data-theme');
                    const next = current === 'light' ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', next);
                    localStorage.setItem('ns_theme', next);
                    this.updateIcon(next);
                    App.Toast.show(`Tema berhasil diubah ke mode ${next}`, "info");
                },
                updateIcon(theme) {
                    const icon = document.querySelector('#theme-toggle-trigger span');
                    if(icon) icon.innerText = theme === 'light' ? 'dark_mode' : 'light_mode';
                }
            },

            // Feed Engine Logic Controller Subsystem
            FeedEngine: {
                attachedImageBase64: null,
                handleImageUploadPreview(input) {
                    if (input.files && input.files[0]) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            App.FeedEngine.attachedImageBase64 = e.target.result;
                            document.getElementById('composer-image-preview-node').innerHTML = `
                                <img src="${e.target.result}" style="width:80px; height:80px; object-fit:cover; border-radius:8px;">
                            `;
                        };
                        reader.readAsDataURL(input.files[0]);
                    }
                },
                createPost() {
                    const input = document.getElementById('post-composer-input');
                    if(!input.value.trim()) return App.Toast.show("Konten kiriman teks tidak boleh kosong!", "warning");
                    
                    const cachedUser = localStorage.getItem('ns_username') || "Kartika Dewi";
                    const newPost = {
                        id: 'p_' + Date.now(),
                        author: cachedUser,
                        avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80",
                        body: input.value,
                        media: this.attachedImageBase64,
                        likes: 0,
                        liked: false,
                        timestamp: "Baru saja",
                        comments: []
                    };
                    
                    SupabaseMockEngine.db.posts.unshift(newPost);
                    SupabaseMockEngine.saveState();
                    
                    input.value = '';
                    this.attachedImageBase64 = null;
                    document.getElementById('composer-image-preview-node').innerHTML = '';
                    
                    this.renderStream();
                    App.Toast.show("Postingan berhasil diterbitkan ke cloud server Supabase", "success");
                },
                triggerLike(postId) {
                    const post = SupabaseMockEngine.db.posts.find(p => p.id === postId);
                    if(post) {
                        if(post.liked) {
                            post.likes--;
                            post.liked = false;
                        } else {
                            post.likes++;
                            post.liked = true;
                        }
                        SupabaseMockEngine.saveState();
                        this.renderStream();
                    }
                },
                submitComment(postId, inputEl) {
                    if(event.key === 'Enter' || event.type === 'click') {
                        const targetInput = inputEl.parentNode.querySelector('input');
                        if(!targetInput.value.trim()) return;
                        
                        const post = SupabaseMockEngine.db.posts.find(p => p.id === postId);
                        const cachedUser = localStorage.getItem('ns_username') || "Kartika Dewi";
                        if(post) {
                            post.comments.push({
                                author: cachedUser,
                                body: targetInput.value
                            });
                            SupabaseMockEngine.saveState();
                            targetInput.value = '';
                            this.renderStream();
                            App.Toast.show("Komentar tersimpan", "success");
                        }
                    }
                },
                renderStream() {
                    const container = document.getElementById('social-feed-stream-target');
                    if(!container) return;
                    
                    let html = '';
                    SupabaseMockEngine.db.posts.forEach(post => {
                        let commentsHtml = '';
                        post.comments.forEach(c => {
                            commentsHtml += `
                                <div class="comment-node">
                                    <div class="comment-bubble">
                                        <strong>${c.author}</strong>
                                        <p style="margin-top:2px;">${c.body}</p>
                                    </div>
                                </div>
                            `;
                        });

                        html += `
                            <article class="premium-card">
                                <div class="post-card-header">
                                    <div class="post-author-block">
                                        <div class="avatar-frame" style="width:38px; height:38px;">
                                            <img src="${post.avatar}" class="avatar-img">
                                        </div>
                                        <div>
                                            <h4 style="font-size:0.92rem; font-weight:600;">${post.author}</h4>
                                            <span style="font-size:0.75rem; color:var(--text-muted);">${post.timestamp}</span>
                                        </div>
                                    </div>
                                    <span class="material-symbols-outlined" style="color:var(--text-muted); cursor:pointer;">more_vert</span>
                                </div>
                                <div class="post-content-body">${post.body}</div>
                                ${post.media ? `<img src="${post.media}" class="post-media-attachment">` : ''}
                                
                                <div class="post-actions-bar">
                                    <button class="action-trigger-btn ${post.liked ? 'active-liked' : ''}" onclick="App.FeedEngine.triggerLike('${post.id}')">
                                        <span class="material-symbols-outlined" style="${post.liked ? 'font-fill:1;' : ''}">favorite</span> Suka (${post.likes})
                                    </button>
                                    <button class="action-trigger-btn">
                                        <span class="material-symbols-outlined">chat_bubble</span> Komentar (${post.comments.length})
                                    </button>
                                </div>
                                
                                <div class="comments-section">
                                    ${commentsHtml}
                                    <div style="display:flex; gap:10px; margin-top:6px;">
                                        <input type="text" class="form-control-input" placeholder="Tulis komentar tim..." style="margin-bottom:0; padding:8px 12px; font-size:0.85rem;" onkeypress="App.FeedEngine.submitComment('${post.id}', this)">
                                        <button class="btn-suite btn-primary" style="padding:8px 12px;" onclick="App.FeedEngine.submitComment('${post.id}', this)"><span class="material-symbols-outlined" style="font-size:1.1rem;">send</span></button>
                                    </div>
                                </div>
                            </article>
                        `;
                    });
                    
                    container.innerHTML = html;
                }
            },

            // Instant Messaging Chat Room Modules
            ChatEngine: {
                sendMessage() {
                    const input = document.getElementById('chat-input-message');
                    if(!input.value.trim()) return;
                    
                    const newMsg = {
                        id: Date.now(),
                        sender: localStorage.getItem('ns_username') || "Kartika Dewi",
                        msg: input.value,
                        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                        incoming: false
                    };
                    
                    SupabaseMockEngine.db.chats.push(newMsg);
                    SupabaseMockEngine.saveState();
                    input.value = '';
                    this.renderChatStream();
                },
                renderChatStream() {
                    const viewport = document.getElementById('chat-stream-viewport-node');
                    if(!viewport) return;
                    
                    let html = '';
                    SupabaseMockEngine.db.chats.forEach(c => {
                        html += `
                            <div class="msg-packet ${c.incoming ? 'incoming' : 'outgoing'}">
                                <span style="font-size:0.75rem; color:var(--text-muted); font-weight:500;">${c.sender}</span>
                                <div class="msg-payload">${c.msg}</div>
                                <span class="msg-timestamp">${c.time}</span>
                            </div>
                        `;
                    });
                    viewport.innerHTML = html;
                    viewport.scrollTop = viewport.scrollHeight;
                }
            },

            // Point of Sales Engine Calculator
            POSEngine: {
                calculateTotal() {
                    const price = parseFloat(document.getElementById('pos-product-select').value);
                    const qty = parseInt(document.getElementById('pos-qty-input').value) || 1;
                    const total = price * qty;
                    document.getElementById('pos-invoice-total-display').innerText = `Rp ${total.toLocaleString('id-ID')}`;
                },
                executeCheckout() {
                    App.Toast.show("Invoice POS Berhasil Disimpan ke Supabase ERP Ledger", "success");
                    const log = document.getElementById('pos-history-log');
                    const price = parseFloat(document.getElementById('pos-product-select').value);
                    const qty = parseInt(document.getElementById('pos-qty-input').value) || 1;
                    const total = price * qty;
                    
                    const item = document.createElement('li');
                    item.style.borderBottom = "1px solid var(--border-color)";
                    item.style.paddingBottom = "6px";
                    item.innerHTML = `INV-${Math.floor(Math.random()*10000)} - Rp ${total.toLocaleString('id-ID')} <span style="color:var(--success);">Sukses</span>`;
                    log.prepend(item);
                }
            },

            // System Configuration Controls
            SettingsEngine: {
                saveGlobalConfig() {
                    const val = document.getElementById('setting-username-field').value;
                    if(!val.trim()) return App.Toast.show("Nama tidak boleh kosong", "danger");
                    
                    localStorage.setItem('ns_username', val);
                    document.getElementById('sidebar-user-name').innerText = val;
                    App.Toast.show("Pengaturan sistem berhasil diperbarui", "success");
                }
            },

            // Modular Table CSV Export Controller
            TableEngine: {
                exportCSV() {
                    App.Toast.show("Mengekspor file master data skema CSV...", "info");
                    let csv = 'Kode SKU,Nama Komoditas,Kategori,Stok,Harga\nSKU-2026-001,Server Rack Mount,Infrastruktur IT,14,4500000\nSKU-2026-002,Router Core Fiber,Networking,3,12000000';
                    const blob = new Blob([csv], { type: 'text/csv' });
                    const el = document.createElement('a');
                    el.href = URL.createObjectURL(blob);
                    el.download = `MasterData_NexSphere_2026.csv`;
                    document.body.appendChild(el);
                    el.click();
                    document.body.removeChild(el);
                }
            },

            // Toast Alert Manager
            Toast: {
                show(message, type = "info") {
                    const container = document.getElementById('toast-container');
                    const toast = document.createElement('div');
                    toast.className = `toast-node`;
                    
                    let borderCol = "var(--primary)";
                    if(type === "success") borderCol = "var(--success)";
                    if(type === "danger") borderCol = "var(--danger)";
                    if(type === "warning") borderCol = "var(--warning)";
                    
                    toast.style.borderLeftColor = borderCol;
                    toast.innerHTML = `
                        <span class="material-symbols-outlined" style="color:${borderCol}">info</span>
                        <span style="font-size:0.9rem; font-weight:500;">${message}</span>
                    `;
                    
                    container.appendChild(toast);
                    setTimeout(() => {
                        toast.style.opacity = '0';
                        toast.style.transform = 'scale(0.9)';
                        toast.style.transition = 'all 0.3s ease';
                        setTimeout(() => toast.remove(), 300);
                    }, 3500);
                }
            },

            // General Events Handler Binder Engine Matrix Configuration
            Events: {
                bindGlobal() {
                    // Sidebar Action Trigger logic collapse metrics
                    document.getElementById('sidebar-toggle-trigger').addEventListener('click', (e) => {
                        App.Utils.createRipple(e);
                        document.getElementById('app-layout').classList.toggle('sidebar-collapsed');
                    });
                    
                    // Theme Switch Button Hook
                    document.getElementById('theme-toggle-trigger').addEventListener('click', (e) => {
                        App.Utils.createRipple(e);
                        App.Theme.toggle();
                    });

                    // Fullscreen Core Feature Toggle
                    document.getElementById('fullscreen-toggle-trigger').addEventListener('click', () => {
                        if (!document.fullscreenElement) {
                            document.documentElement.requestFullscreen();
                        } else if (document.exitFullscreen) {
                            document.exitFullscreen();
                        }
                    });
                }
            },

            // Utility Toolkit Helpers
            Utils: {
                createRipple(event) {
                    const btn = event.currentTarget;
                    const circle = document.createElement("span");
                    const diameter = Math.max(btn.clientWidth, btn.clientHeight);
                    const radius = diameter / 2;
                    
                    circle.style.width = circle.style.height = `${diameter}px`;
                    circle.style.left = `${event.clientX - btn.getBoundingClientRect().left - radius}px`;
                    circle.style.top = `${event.clientY - btn.getBoundingClientRect().top - radius}px`;
                    circle.classList.add("ripple");
                    
                    const ripple = btn.getElementsByClassName("ripple")[0];
                    if (ripple) ripple.remove();
                    btn.appendChild(circle);
                }
            }
        };

        // Window Init Entry-point runtime
        window.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
