<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NexSphere - Enterprise Business Suite</title>
    <!-- Google Fonts & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. CSS VARIABLES, CORE THEMES & RESET (FONT ARIAL 8pt/11px BASELINE)
           ========================================================================== */
        :root {
            --font-main: 'Arial', sans-serif;
            --base-font-size: 11px; /* Setara 8pt */
            
            /* Light Theme Configuration */
            --bg-primary: #f1f5f9;
            --bg-surface: rgba(255, 255, 255, 0.8);
            --bg-surface-hover: rgba(255, 255, 255, 0.95);
            --border-color: rgba(226, 232, 240, 0.8);
            --text-main: #0f172a;
            --text-muted: #64748b;
            
            /* UI Color System Palette */
            --primary: #4f46e5;
            --primary-state: rgba(79, 70, 229, 0.08);
            --primary-container: #e0e7ff;
            --secondary: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #6366f1;
            
            /* Structural Foundations */
            --blur-radius: 12px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px -2px rgba(0,0,0,0.08);
            --shadow-lg: 0 16px 24px -6px rgba(0,0,0,0.12);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-round: 9999px;
            
            /* Screen Layout Constants */
            --header-height: 50px;
            --sidebar-width: 220px;
            --bottom-nav-height: 60px;
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-primary: #090d16;
            --bg-surface: rgba(20, 27, 41, 0.75);
            --bg-surface-hover: rgba(28, 37, 56, 0.9);
            --border-color: rgba(51, 65, 85, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #818cf8;
            --primary-state: rgba(129, 140, 248, 0.15);
            --primary-container: #1e1b4b;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px -2px rgba(0,0,0,0.5);
            --shadow-lg: 0 16px 24px -6px rgba(0,0,0,0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            font-size: var(--base-font-size);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }

        input, textarea, select, button {
            font-family: inherit;
            color: inherit;
            outline: none;
        }

        a { text-decoration: none; color: inherit; }

        /* Custom Scrollbar UI Engine */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: var(--radius-round); }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ==========================================================================
           2. MASTER LAYOUT ARCHITECTURE
           ========================================================================== */
        #app-layout {
            display: grid;
            grid-template-areas: 
                "header header"
                "sidebar content"
                "footer footer";
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: var(--header-height) 1fr auto;
            min-height: 100vh;
        }

        #app-layout.sidebar-collapsed {
            --sidebar-width: 60px;
        }

        /* Fixed App Header Shell */
        .app-header {
            grid-area: header;
            background: var(--bg-surface);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--header-height);
            z-index: 1000;
            box-shadow: var(--shadow-sm);
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .brand-logo {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 13px;
        }

        .brand-name {
            font-size: 14px; font-weight: 700;
            background: linear-gradient(135deg, var(--text-main), var(--text-muted));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #app-layout.sidebar-collapsed .brand-name { display: none; }

        .search-container { position: relative; width: 220px; }
        .search-input {
            width: 100%; padding: 6px 10px 6px 28px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.02);
            transition: var(--transition-smooth);
        }
        [data-theme="dark"] .search-input { background: rgba(255, 255, 255, 0.02); }
        .search-input:focus { border-color: var(--primary); background: var(--bg-surface-hover); }
        .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .meta-clock-widget {
            display: flex; flex-direction: column; align-items: flex-end;
            border-right: 1px solid var(--border-color); padding-right: 12px;
        }
        .meta-time { font-weight: 700; color: var(--text-main); }

        /* Icon Action Controller Controls */
        .icon-action-btn {
            width: 32px; height: 32px; border-radius: var(--radius-sm);
            border: none; background: transparent; color: var(--text-main);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: var(--transition-smooth);
        }
        .icon-action-btn:hover { background: var(--primary-state); color: var(--primary); }
        .icon-action-btn .badge-dot {
            position: absolute; top: 6px; right: 6px; width: 6px; height: 6px;
            background: var(--danger); border-radius: var(--radius-round);
        }

        /* Fixed Sidebar Component Drawer */
        .app-sidebar {
            grid-area: sidebar;
            background: var(--bg-surface);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border-right: 1px solid var(--border-color);
            position: fixed; top: var(--header-height); left: 0; bottom: 0;
            width: var(--sidebar-width); z-index: 999;
            transition: var(--transition-smooth);
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 12px 0; box-shadow: var(--shadow-sm);
        }

        .sidebar-menu-wrapper { display: flex; flex-direction: column; gap: 2px; padding: 0 6px; }
        
        .menu-item {
            display: flex; align-items: center; gap: 10px; padding: 8px 12px;
            border-radius: var(--radius-sm); color: var(--text-muted);
            cursor: pointer; transition: var(--transition-smooth);
            position: relative; overflow: hidden;
        }
        .menu-item:hover { background: var(--primary-state); color: var(--primary); }
        .menu-item.active {
            background: var(--primary); color: white; font-weight: bold;
            box-shadow: 0 2px 6px rgba(79, 70, 229, 0.2);
        }

        #app-layout.sidebar-collapsed .menu-text { display: none; }

        .sidebar-user-card {
            margin: 0 6px; padding: 8px; background: rgba(0, 0, 0, 0.02);
            border-radius: var(--radius-sm); display: flex; align-items: center; gap: 8px;
            border: 1px solid var(--border-color);
        }
        [data-theme="dark"] .sidebar-user-card { background: rgba(255, 255, 255, 0.02); }
        .avatar-frame {
            position: relative; width: 28px; height: 28px;
            border-radius: var(--radius-round); padding: 1px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
        }
        .avatar-img { width: 100%; height: 100%; border-radius: var(--radius-round); object-fit: cover; }
        .user-meta-info { display: flex; flex-direction: column; overflow: hidden; }
        .user-display-name { font-weight: 600; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .user-role-lbl { font-size: 9px; color: var(--text-muted); }
        #app-layout.sidebar-collapsed .sidebar-user-card { padding: 4px; justify-content: center; }
        #app-layout.sidebar-collapsed .user-meta-info { display: none; }

        /* Workspace Main Context Viewport */
        .app-content {
            grid-area: content; margin-top: var(--header-height); margin-left: var(--sidebar-width);
            padding: 16px; min-height: calc(100vh - var(--header-height) - 35px);
            transition: var(--transition-smooth);
        }

        /* Fixed App Footer Layout */
        .app-footer {
            grid-area: footer; background: var(--bg-surface);
            border-top: 1px solid var(--border-color); margin-left: var(--sidebar-width);
            padding: 8px 16px; display: flex; justify-content: space-between;
            align-items: center; color: var(--text-muted); transition: var(--transition-smooth);
        }

        .network-status-badge { display: flex; align-items: center; gap: 4px; font-weight: bold; }
        .status-dot { width: 6px; height: 6px; border-radius: var(--radius-round); background: var(--success); }
        .status-dot.offline { background: var(--danger); }

        .bottom-nav { display: none; }

        /* ==========================================================================
           3. UI STYLING & MASTER PREMIUM COMPONENTS (FONTS INTEGRITY AT 8pt FIXED)
           ========================================================================== */
        .view-container { animation: fadeIn 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        .grid-dashboard { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
        
        .premium-card {
            background: var(--bg-surface); backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border: 1px solid var(--border-color); border-radius: var(--radius-md);
            padding: 16px; box-shadow: var(--shadow-sm); transition: var(--transition-smooth);
            margin-bottom: 16px; position: relative;
        }
        .premium-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }

        .welcome-gradient-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none;
        }
        .welcome-gradient-card * { color: white !important; }

        .stats-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .stat-box {
            background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 12px; display: flex; align-items: center; gap: 12px;
        }
        .stat-icon-wrapper {
            width: 32px; height: 32px; border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
        }

        /* Buttons Core Engine */
        .btn-suite {
            padding: 6px 12px; border-radius: var(--radius-sm); border: none;
            font-weight: 600; cursor: pointer; display: inline-flex;
            align-items: center; gap: 6px; justify-content: center;
            transition: var(--transition-smooth); position: relative; overflow: hidden;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: rgba(0,0,0,0.05); color: var(--text-main); }
        [data-theme="dark"] .btn-secondary { background: rgba(255,255,255,0.05); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-info { background: var(--info); color: white; }
        .btn-suite:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Floating Label Form Core controls UI */
        .form-group-floating { position: relative; margin-bottom: 12px; }
        .form-control-input {
            width: 100%; padding: 8px 10px; border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); background: transparent; transition: var(--transition-smooth);
        }
        .form-control-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-state); }
        
        /* Premium Data Table Architecture Component */
        .table-panel-holder { width: 100%; overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border-color); }
        .premium-table { width: 100%; border-collapse: collapse; text-align: left; }
        .premium-table th {
            background: rgba(0,0,0,0.02); padding: 8px 12px; font-weight: 700;
            color: var(--text-muted); border-bottom: 2px solid var(--border-color);
            cursor: pointer; user-select: none;
        }
        [data-theme="dark"] .premium-table th { background: rgba(255,255,255,0.02); }
        .premium-table td { padding: 8px 12px; border-bottom: 1px solid var(--border-color); }
        .premium-table tr:last-child td { border-bottom: none; }
        .premium-table tr:hover td { background: var(--primary-state); }

        /* Social Media Module Components Engine */
        .post-composer-area { display: flex; flex-direction: column; gap: 8px; }
        .composer-textarea {
            width: 100%; min-height: 60px; border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); background: rgba(0,0,0,0.01); padding: 8px; resize: none;
        }
        .post-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .post-author-block { display: flex; align-items: center; gap: 8px; }
        .post-content-body { line-height: 1.5; margin-bottom: 10px; white-space: pre-wrap; }
        .post-media-attachment { width: 100%; max-height: 220px; border-radius: var(--radius-sm); object-fit: cover; margin-bottom: 10px; border: 1px solid var(--border-color); }
        .post-actions-bar { display: flex; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 4px 0; gap: 4px; }
        .action-trigger-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 6px; border: none; background: transparent; cursor: pointer; color: var(--text-muted); }
        .action-trigger-btn.active-liked { color: var(--danger); font-weight: bold; }
        .comments-section { background: rgba(0, 0, 0, 0.01); border-radius: var(--radius-sm); padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .comment-node { display: flex; gap: 8px; }
        .comment-bubble { background: var(--bg-surface-hover); border: 1px solid var(--border-color); padding: 6px 10px; border-radius: 0 var(--radius-md) var(--radius-md) var(--radius-md); flex: 1; }

        /* Chat Modules Subsystem Engine */
        .chat-module-container {
            display: grid; grid-template-columns: 180px 1fr; border: 1px solid var(--border-color);
            border-radius: var(--radius-md); background: var(--bg-surface); height: calc(100vh - var(--header-height) - 100px); overflow: hidden;
        }
        .chat-channels-list { border-right: 1px solid var(--border-color); overflow-y: auto; display: flex; flex-direction: column; }
        .channel-row { display: flex; align-items: center; gap: 8px; padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border-color); }
        .channel-row.active { background: var(--primary-state); font-weight: bold; }
        .chat-viewport { display: flex; flex-direction: column; justify-content: space-between; background: rgba(0,0,0,0.01); }
        .chat-messages-stream { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg-packet { display: flex; flex-direction: column; max-width: 70%; gap: 2px; }
        .msg-packet.incoming { align-self: flex-start; }
        .msg-packet.outgoing { align-self: flex-end; align-items: flex-end; }
        .msg-payload { padding: 8px 12px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); }
        .incoming .msg-payload { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 0 var(--radius-md) var(--radius-md) var(--radius-md); }
        .outgoing .msg-payload { background: var(--primary); color: white; border-radius: var(--radius-md) 0 var(--radius-md) var(--radius-md); }
        .msg-timestamp { font-size: 9px; color: var(--text-muted); }
        .chat-composer-strip { padding: 10px 16px; background: var(--bg-surface); border-top: 1px solid var(--border-color); display: flex; gap: 8px; align-items: center; }

        /* Modal Overlay & Sheet Container UI */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.3); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: var(--transition-smooth);
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-sheet-box {
            background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); width: 90%; max-width: 400px; padding: 16px;
            box-shadow: var(--shadow-lg); transform: scale(0.95); transition: var(--transition-smooth);
        }
        .modal-overlay.active .modal-sheet-box { transform: scale(1); }

        /* Dynamic System Toast Gateway Alerts CSS */
        #toast-container { position: fixed; top: 16px; right: 16px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast-node {
            background: var(--bg-surface); border-left: 4px solid var(--primary); box-shadow: var(--shadow-lg);
            padding: 10px 16px; border-radius: var(--radius-sm); display: flex; align-items: center; gap: 10px;
            min-width: 240px; pointer-events: auto; animation: slideIn 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .ripple { position: absolute; background: rgba(255, 255, 255, 0.35); border-radius: var(--radius-round); transform: scale(0); animation: ripple-anim 0.5s linear; pointer-events: none; }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        /* User Menu Profile Dropdown Overlay styling */
        .dropdown-menu-sheet {
            position: absolute; top: var(--header-height); right: 16px;
            background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); min-width: 140px; box-shadow: var(--shadow-lg);
            display: none; flex-direction: column; padding: 4px; z-index: 1005;
        }
        .dropdown-menu-sheet.active { display: flex; }
        .dropdown-item-node { padding: 6px 10px; border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .dropdown-item-node:hover { background: var(--primary-state); color: var(--primary); }

        /* ==========================================================================
           4. ADAPTIVE RESPONSIVENESS MEDIA INTERFACES HUB
           ========================================================================== */
        @media (max-width: 992px) {
            #app-layout { grid-template-columns: 60px 1fr; }
            .app-sidebar { width: 60px; }
            .brand-name, .menu-text, .user-meta-info { display: none; }
            .app-content, .app-footer { margin-left: 60px; }
        }

        @media (max-width: 768px) {
            #app-layout {
                grid-template-areas: "header header" "content content";
                grid-template-columns: 1fr;
            }
            .app-sidebar, .app-footer { display: none; }
            .app-content { margin-left: 0; padding: 12px; padding-bottom: calc(var(--bottom-nav-height) + 12px); }
            .grid-dashboard { grid-template-columns: 1fr; }

            /* Mobile Frame Bottom Navigation Engine Trigger activation */
            .bottom-nav {
                display: flex; position: fixed; bottom: 0; left: 0; right: 0;
                height: var(--bottom-nav-height); background: var(--bg-surface);
                backdrop-filter: blur(var(--blur-radius)); -webkit-backdrop-filter: blur(var(--blur-radius));
                border-top: 1px solid var(--border-color); box-shadow: var(--shadow-lg);
                z-index: 1000; padding-bottom: env(safe-area-inset-bottom);
                justify-content: space-around; align-items: center;
            }
            .bottom-nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 9px; gap: 2px; flex: 1; padding: 4px 0; cursor: pointer; }
            .bottom-nav-item.active { color: var(--primary); font-weight: bold; }
            .bottom-nav-item.active .material-symbols-outlined { background: var(--primary-container); padding: 2px 12px; border-radius: var(--radius-round); }
            
            /* Responsive Table Mobile List Grid Parser */
            .premium-table-container th { display: none; }
            .premium-table-container tr { display: block; margin-bottom: 8px; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-surface); }
            .premium-table-container td { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); text-align: right; padding: 8px 12px; }
            .premium-table-container td::before { content: attr(data-label); font-weight: 700; color: var(--text-muted); text-align: left; }
            .chat-module-container { grid-template-columns: 1fr; }
            .chat-channels-list { display: none; }
        }
    </style>
</head>
<body>

    <div id="app-layout">
        <!-- APP TOP NAVBAR HEADER -->
        <header class="app-header">
            <div class="header-left">
                <div class="brand-wrapper" onclick="App.Router.navigate('dashboard')">
                    <div class="brand-logo">N</div>
                    <span class="brand-name">NexSphere</span>
                </div>
                <button class="icon-action-btn" id="sidebar-toggle-trigger" aria-label="Toggle Sidebar Menu">
                    <span class="material-symbols-outlined" style="font-size:16px;">menu</span>
                </button>
                <div class="search-container">
                    <span class="material-symbols-outlined search-icon" style="font-size:14px;">search</span>
                    <input type="text" class="search-input" placeholder="Cari master berkas, pos..." id="global-search-engine">
                </div>
            </div>
            
            <div class="header-right">
                <div class="meta-clock-widget">
                    <span id="live-date-str">Memuat...</span>
                    <span id="live-clock-str" class="meta-time">00:00:00 WIB</span>
                </div>
                <button class="icon-action-btn" id="refresh-view-trigger" aria-label="Segarkan Halaman">
                    <span class="material-symbols-outlined" style="font-size:16px;">refresh</span>
                </button>
                <button class="icon-action-btn" id="theme-toggle-trigger" aria-label="Toggle Tema Gelap">
                    <span class="material-symbols-outlined" style="font-size:16px;">dark_mode</span>
                </button>
                <button class="icon-action-btn" id="fullscreen-toggle-trigger" aria-label="Ubah Layar Penuh">
                    <span class="material-symbols-outlined" style="font-size:16px;">fullscreen</span>
                </button>
                <button class="icon-action-btn" id="notification-bell-trigger" aria-label="Buka Notifikasi">
                    <span class="material-symbols-outlined" style="font-size:16px;">notifications</span>

                                <button class="btn-suite btn-primary" onclick="App.SettingsModule.executeSave()">Simpan Seluruh Perubahan</button>
                            </div>
                        `;
                    },
                    profil() {
                        return `
                            <div class="premium-card" style="max-width:400px; text-align:center;">
                                <div class="avatar-frame" style="width:64px; height:64px; margin:0 auto 12px auto;">
                                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80" class="avatar-img">
                                </div>
                                <h2 style="font-size:14px; font-weight:700;" id="profile-display-name-target">Kartika Dewi</h2>
                                <p style="color:var(--text-muted); margin-top:2px;">Senior System Administrator</p>
                                <hr style="border:none; border-top:1px solid var(--border-color); margin:12px 0;">
                                <div style="text-align:left; font-size:10px; display:flex; flex-direction:column; gap:4px;">
                                    <div><strong>Email Korporat:</strong> kartika.dewi@nexsphere.internal</div>
                                    <div><strong>Hak Akses Enkripsi:</strong> Supabase Root Operator</div>
                                </div>
                            </div>
                        `;
                    },
                    bantuan() {
                        return `
                            <div class="premium-card">
                                <h3 style="font-weight:700; margin-bottom:8px;">Pusat Bantuan & Dokumentasi Teknis NexSphere</h3>
                                <p style="color:var(--text-muted);">Jika mendapati kendala sinkronisasi tabel data cloud Supabase REST API, hubungi DevOps Administrator via email eksternal support@nexsphere.co.id.</p>
                            </div>
                        `;
                    }
                },

                // Lifecycle view execution hooks per view initialization context
                viewHooks: {
                    'social-feed'() { App.FeedModule.renderStream(); },
                    'chat-room'() { App.ChatModule.renderStream(); },
                    'master-data'() { App.TableDataModule.renderRows(); },
                    inventaris() { App.TableDataModule.renderRows(); }
                }
            },

            // Navigation Framework Engine Manager Builder Mapping Loop UI Component
            Navigation: {
                render() {
                    const sideMenuTarget = document.getElementById('sidebar-menu-injector');
                    const bottomMenuTarget = document.getElementById('bottom-nav-injector');
                    
                    let sideHtml = '';
                    let bottomHtml = '';
                    
                    AppNavigationRegistry.forEach(menu => {
                        sideHtml += `
                            <a class="menu-item" data-view-target="${menu.id}" onclick="App.Router.navigate('${menu.id}')">
                                <span class="material-symbols-outlined" style="font-size:16px;">${menu.icon}</span>
                                <span class="menu-text">${menu.label}</span>
                            </a>
                        `;
                        
                        // Select primary anchor metrics modules elements for responsive layout display on mobile devices
                        if(['dashboard', 'social-feed', 'chat-room', 'pengaturan'].includes(menu.id)) {
                            bottomHtml += `
                                <a class="bottom-nav-item" data-view-target="${menu.id}" onclick="App.Router.navigate('${menu.id}')">
                                    <span class="material-symbols-outlined" style="font-size:16px;">${menu.icon}</span>
                                    <span>${menu.label}</span>
                                </a>
                            `;
                        }
                    });
                    
                    sideMenuTarget.innerHTML = sideHtml;
                    bottomMenuTarget.innerHTML = bottomHtml;
                }
            },

            // High Precision Realtime Calendar Clock Modules
            Clock: {
                start() {
                    const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
                    const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
                    
                    setInterval(() => {
                        const now = new Date();
                        const hrs = String(now.getHours()).padStart(2, '0');
                        const mins = String(now.getMinutes()).padStart(2, '0');
                        const secs = String(now.getSeconds()).padStart(2, '0');
                        
                        document.getElementById('live-date-str').innerText = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
                        document.getElementById('live-clock-str').innerText = `${hrs}:${mins}:${secs} WIB`;
                        document.getElementById('footer-year-sync').innerText = now.getFullYear();
                    }, 1000);
                }
            },

            // Core UI Themes State Manager Controller
            Theme: {
                init() {
                    const currentTheme = localStorage.getItem('sb_theme_cache') || 'light';
                    document.documentElement.setAttribute('data-theme', currentTheme);
                    this.syncIcon(currentTheme);
                },
                toggle() {
                    const current = document.documentElement.getAttribute('data-theme');
                    const next = current === 'light' ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', next);
                    localStorage.setItem('sb_theme_cache', next);
                    this.syncIcon(next);
                    App.Toast.show(`Tema visual beralih ke mode ${next}`, "info");
                },
                syncIcon(theme) {
                    const icon = document.querySelector('#theme-toggle-trigger span');
                    if(icon) icon.innerText = theme === 'light' ? 'dark_mode' : 'light_mode';
                }
            },

            // Social Media Community Post Modules Subsystem
            FeedModule: {
                imgCache: null,
                handleImagePreview(input) {
                    if (input.files && input.files[0]) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            this.imgCache = e.target.result;
                            document.getElementById('composer-image-preview-target').innerHTML = `
                                <img src="${e.target.result}" style="width:50px; height:50px; object-fit:cover; border-radius:4px;">
                            `;
                        };
                        reader.readAsDataURL(input.files[0]);
                    }
                },
                executeCreatePost() {
                    const text = document.getElementById('post-text-body-field');
                    if(!text.value.trim()) return App.Toast.show("Konten kiriman deskripsi tidak boleh kosong!", "warning");
                    
                    const name = localStorage.getItem('sb_user_cache') || "Kartika Dewi";
                    const item = {
                        id: 'p_' + Date.now(),
                        author: name,
                        avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80",
                        body: text.value,
                        media: this.imgCache,
                        likes: 0,
                        liked: false,
                        timestamp: "Baru saja",
                        comments: []
                    };
                    
                    SupabaseClientEngine.db.posts.unshift(item);
                    SupabaseClientEngine.saveState();
                    
                    text.value = ''; this.imgCache = null;
                    document.getElementById('composer-image-preview-target').innerHTML = '';
                    this.renderStream();
                    App.Toast.show("Postingan baru diunggah sukses ke database Supabase", "success");
                },
                like(id) {
                    const post = SupabaseClientEngine.db.posts.find(p => p.id === id);
                    if(post) {
                        if(post.liked) { post.likes--; post.liked = false; }
                        else { post.likes++; post.liked = true; }
                        SupabaseClientEngine.saveState(); this.renderStream();
                    }
                },
                addComment(id, inputEl, e) {
                    if(e.key === 'Enter' || e.type === 'click') {
                        const target = inputEl.parentNode.querySelector('input');
                        if(!target.value.trim()) return;
                        
                        const post = SupabaseClientEngine.db.posts.find(p => p.id === id);
                        if(post) {
                            post.comments.push({ author: localStorage.getItem('sb_user_cache') || "Kartika Dewi", body: target.value });
                            SupabaseClientEngine.saveState(); target.value = ''; this.renderStream();
                        }
                    }
                },
                renderStream() {
                    const targetNode = document.getElementById('social-feed-stream-injector');
                    if(!targetNode) return;
                    
                    let html = '';
                    SupabaseClientEngine.db.posts.forEach(post => {
                        let cHtml = '';
                        post.comments.forEach(c => {
                            cHtml += `<div class="comment-node"><div class="comment-bubble"><strong>${c.author}</strong>: ${c.body}</div></div>`;
                        });
                        
                        html += `
                            <article class="premium-card">
                                <div class="post-card-header">
                                    <div class="post-author-block">
                                        <div class="avatar-frame" style="width:24px; height:24px;"><img src="${post.avatar}" class="avatar-img"></div>
                                        <div><h4 style="font-weight:700;">${post.author}</h4><span style="color:var(--text-muted); font-size:9px;">${post.timestamp}</span></div>
                                    </div>
                                </div>
                                <div class="post-content-body">${post.body}</div>
                                ${post.media ? `<img src="${post.media}" class="post-media-attachment">` : ''}
                                <div class="post-actions-bar">
                                    <button class="action-trigger-btn ${post.liked ? 'active-liked' : ''}" onclick="App.FeedModule.like('${post.id}')"><span class="material-symbols-outlined" style="font-size:14px;">favorite</span> Suka (${post.likes})</button>
                                    <button class="action-trigger-btn"><span class="material-symbols-outlined" style="font-size:14px;">chat</span> Komentar (${post.comments.length})</button>
                                </div>
                                <div class="comments-section" style="margin-top:6px;">
                                    ${cHtml}
                                    <div style="display:flex; gap:6px; margin-top:4px;">
                                        <input type="text" class="form-control-input" placeholder="Tulis tanggapan..." style="padding:4px 8px;">
                                        <button class="btn-suite btn-primary" onclick="App.FeedModule.addComment('${post.id}', this, event)"><span class="material-symbols-outlined" style="font-size:12px;">send</span></button>
                                    </div>
                                </div>
                            </article>
                        `;
                    });
                    targetNode.innerHTML = html;
                }
            },

            // Instant Communication Messaging Group Channels Subsystem
            ChatModule: {
                executeSend() {
                    const node = document.getElementById('chat-composer-input-message');
                    if(!node.value.trim()) return;
                    
                    const packet = {
                        id: Date.now(),
                        sender: localStorage.getItem('sb_user_cache') || "Kartika Dewi",
                        msg: node.value,
                        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                        incoming: false
                    };
                    
                    SupabaseClientEngine.db.chats.push(packet);
                    SupabaseClientEngine.saveState();
                    node.value = ''; this.renderStream();
                },
                renderStream() {
                    const view = document.getElementById('chat-messages-stream-node');
                    if(!view) return;
                    
                    let html = '';
                    SupabaseClientEngine.db.chats.forEach(c => {
                        html += `
                            <div class="msg-packet ${c.incoming ? 'incoming' : 'outgoing'}">
                                <span style="font-size:9px; color:var(--text-muted); font-weight:bold;">${c.sender}</span>
                                <div class="msg-payload">${c.msg}</div>
                                <span class="msg-timestamp">${c.time}</span>
                            </div>
                        `;
                    });
                    view.innerHTML = html;
                    view.scrollTop = view.scrollHeight;
                }
            },

            // Modern Responsive Data Tables Component Engine Matrix Module
            TableDataModule: {
                sortDirection: true,
                renderRows() {
                    const target = document.getElementById('master-data-table-rows-injector');
                    if(!target) return;
                    
                    let html = '';
                    SupabaseClientEngine.db.inventoris.forEach(item => {
                        html += `
                            <tr>
                                <td data-label="Kode SKU" style="font-weight:700; color:var(--primary);">${item.sku}</td>
                                <td data-label="Nama Komoditas">${item.name}</td>
                                <td data-label="Kategori Kelompok">${item.cat}</td>
                                <td data-label="Stok Minim">${item.qty} Unit</td>
                                <td data-label="Harga Satuan Gudang">Rp ${item.price.toLocaleString('id-ID')}</td>
                                <td data-label="Status"><span style="padding:2px 6px; font-weight:bold; border-radius:4px; font-size:9px; ${item.status==='Optimal' ? 'background:rgba(16,185,129,0.1); color:var(--success);' : 'background:rgba(239,68,68,0.1); color:var(--danger);'}">${item.status}</span></td>
                            </tr>
                        `;
                    });
                    target.innerHTML = html;
                },
                sortColumn(key) {
                    this.sortDirection = !this.sortDirection;
                    SupabaseClientEngine.db.inventoris.sort((a,b) => {
                        if(a[key] < b[key]) return this.sortDirection ? -1 : 1;
                        if(a[key] > b[key]) return this.sortDirection ? 1 : -1;
                        return 0;
                    });
                    this.renderRows();
                    App.Toast.show(`Tabel diurutkan berdasarkan kolom target`, "info");
                },
                exportCSVData() {
                    let text = 'Kode SKU,Nama Komoditas,Kategori,Stok,Harga\n';
                    SupabaseClientEngine.db.inventoris.forEach(i => { text += `${i.sku},${i.name},${i.cat},${i.qty},${i.price}\n`; });
                    const blob = new Blob([text], { type: 'text/csv' });
                    const anchor = document.createElement('a');
                    anchor.href = URL.createObjectURL(blob); anchor.download = `Logistik_Export_Supabase.csv`;
                    document.body.appendChild(anchor); anchor.click(); anchor.remove();
                }
            },

            // Point of Sales (POS) Checkout Kasir Subsystem
            POSModule: {
                runKalkulasi() {
                    const val = parseFloat(document.getElementById('pos-select-product').value);
                    const qty = parseInt(document.getElementById('pos-qty-field').value) || 1;
                    document.getElementById('pos-invoice-total-display').innerText = `Rp ${(val*qty).toLocaleString('id-ID')}`;
                },
                checkout() {
                    App.Toast.show("Transaksi Kasir POS Berhasil Diunggah ke Cloud Ledger", "success");
                    const target = document.getElementById('pos-receipt-logs-target');
                    const val = parseFloat(document.getElementById('pos-select-product').value);
                    const qty = parseInt(document.getElementById('pos-qty-field').value) || 1;
                    
                    const node = document.createElement('li');
                    node.style.borderBottom = "1px solid var(--border-color)"; node.style.paddingBottom = "4px";
                    node.innerHTML = `INV-${Math.floor(Math.random()*10000)} - Rp ${(val*qty).toLocaleString('id-ID')} <span style="color:var(--success); font-weight:bold; float:right;">Sukses</span>`;
                    target.prepend(node);
                }
            },

            // Configurations Settings Management Engine Modules
            SettingsModule: {
                executeSave() {
                    const value = document.getElementById('setting-operator-name-field').value;
                    if(!value.trim()) return App.Toast.show("Identitas nama parameter tidak boleh kosong!", "danger");
                    
                    localStorage.setItem('sb_user_cache', value);
                    document.getElementById('sidebar-user-name').innerText = value;
                    App.Toast.show("Konfigurasi dasar sistem diperbarui sukses", "success");
                }
            },

            // Control Layer Interactive Dialog Modals System Window Overlay Sheet
            Modal: {
                open(title, text) {
                    const root = document.getElementById('system-modal-root');
                    document.getElementById('modal-container-body').innerHTML = `
                        <h3 style="font-weight:700; margin-bottom:8px;">${title}</h3>
                        <p style="color:var(--text-muted); line-height:1.4; margin-bottom:12px;">${text}</p>
                        <div style="text-align:right;"><button class="btn-suite btn-primary" onclick="App.Modal.close()">Dimengerti</button></div>
                    `;
                    root.classList.add('active');
                },
                close() { document.getElementById('system-modal-root').classList.remove('active'); }
            },

            // Toast Notifications Popups Stack Overlay System
            Toast: {
                show(msg, style = "info") {
                    const gateway = document.getElementById('toast-container');
                    const block = document.createElement('div');
                    block.className = `toast-node`;
                    
                    let color = "var(--primary)";
                    if(style === "success") color = "var(--success)";
                    if(style === "danger") color = "var(--danger)";
                    if(style === "warning") color = "var(--warning)";
                    
                    block.style.borderLeftColor = color;
                    block.innerHTML = `<span class="material-symbols-outlined" style="color:${color}; font-size:14px;">info</span><span style="font-weight:600;">${msg}</span>`;
                    gateway.appendChild(block);
                    
                    setTimeout(() => {
                        block.style.opacity = '0'; block.style.transform = 'scale(0.9)'; block.style.transition = 'all 0.2s linear';
                        setTimeout(() => block.remove(), 200);
                    }, 3000);
                }
            },

            // Authentication Interface Subsystem Logs
            Auth: {
                logout() {
                    App.Toast.show("Sesi operator dibersihkan. Memuat ulang sistem terpadu...", "warning");
                    setTimeout(() => { localStorage.clear(); window.location.reload(); }, 1500);
                }
            },

            // Bind Core Dynamic Action Controller UI Controls Lifecycle Event Matrix
            Events: {
                bindGlobal() {
                    document.getElementById('sidebar-toggle-trigger').addEventListener('click', (e) => {
                        App.Utils.ripple(e); document.getElementById('app-layout').classList.toggle('sidebar-collapsed');
                    });
                    
                    document.getElementById('theme-toggle-trigger').addEventListener('click', (e) => {
                        App.Utils.ripple(e); App.Theme.toggle();
                    });

                    document.getElementById('refresh-view-trigger').addEventListener('click', (e) => {
                        App.Utils.ripple(e); App.Router.executeRouteTransition(); App.Toast.show("Tampilan data view berhasil disinkronisasikan", "success");
                    });

                    document.getElementById('fullscreen-toggle-trigger').addEventListener('click', () => {
                        if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); }
                        else { document.exitFullscreen(); }
                    });

                    // Dropdown Profile Drawer overlay click listener hooks
                    const trigger = document.getElementById('profile-dropdown-trigger');
                    const sheet = document.getElementById('profile-dropdown-sheet');
                    trigger.addEventListener('click', (e) => { e.stopPropagation(); sheet.classList.toggle('active'); });
                    document.addEventListener('click', () => sheet.classList.remove('active'));

                    // Modal Close Listener Shortcut bindings matrix hooks
                    document.getElementById('system-modal-root').addEventListener('click', (e) => {
                        if(e.target.id === 'system-modal-root') App.Modal.close();
                    });
                    window.addEventListener('keydown', (e) => { if(e.key === 'Escape') App.Modal.close(); });

                    // Global core input search filters logic matrix interceptor engine
                    document.getElementById('global-search-engine').addEventListener('input', (e) => {
                        const val = e.target.value.toLowerCase();
                        document.querySelectorAll('tbody tr, article').forEach(el => {
                            if(el.innerText.toLowerCase().includes(val)) el.style.display = '';
                            else el.style.display = 'none';
                        });
                    });
                }
            },

            // UI Utility Tools Helper Packets Architecture
            Utils: {
                ripple(event) {
                    const btn = event.currentTarget;
                    const circle = document.createElement("span");
                    const size = Math.max(btn.clientWidth, btn.clientHeight);
                    const rad = size / 2;
                    
                    circle.style.width = circle.style.height = `${size}px`;
                    circle.style.left = `${event.clientX - btn.getBoundingClientRect().left - rad}px`;
                    circle.style.top = `${event.clientY - btn.getBoundingClientRect().top - rad}px`;
                    circle.classList.add("ripple");
                    
                    const existing = btn.getElementsByClassName("ripple")[0];
                    if (existing) existing.remove();
                    btn.appendChild(circle);
                }
            }
        };

        // Initialize Native Core Window Lifecycle Listener Gateway Entrypoint
        window.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
