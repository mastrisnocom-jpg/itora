<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tech Social - Workspace</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --bg-body: #f4f9f6;
            --bg-glass-solid: #ffffff;
            --border-color: rgba(1, 181, 116, 0.15);
            --text-main: #0b2e1e;
            --text-muted: #7fa895;
            --primary: #01B574;
            --primary-state: rgba(1, 181, 116, 0.08);
            --danger: #EE5D50;
            --shadow-soft: 0 4px 12px rgba(0,0,0,0.05);
            --radius-md: 12px;
            --radius-xl: 20px;
        }

        [data-theme="dark"] {
            --bg-body: #0d1117;
            --bg-glass-solid: #161b22;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --primary: #58a6ff; 
            --primary-state: rgba(88, 166, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); }
        body { background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        
        #app-layout { display: grid; grid-template-areas: "header" "content"; grid-template-columns: 1fr; grid-template-rows: auto 1fr; min-height: 100vh; }
        .app-header { background: var(--bg-glass-solid); border-bottom: 1px solid var(--border-color); padding: 12px 16px; position: sticky; top: 0; z-index: 999; }
        
        .header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .search-area { flex: 1; display: flex; align-items: center; justify-content: flex-end; }
        .search-input-hidden { display: none; width: 100%; padding: 8px 12px; border-radius: var(--radius-md); background: var(--bg-body); border: 1px solid var(--border-color); color: var(--text-main); }
        .search-input-hidden.active { display: block; }
        
        .icon-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: none; color: var(--text-muted); cursor: pointer; border-radius: 50%; }
        .icon-btn:hover { background: var(--primary-state); color: var(--primary); }

        .app-content { padding: 16px; max-width: 600px; margin: 0 auto; width: 100%; }
        
        /* POSTS */
        .post-card { background: var(--bg-glass-solid); padding: 16px; margin-bottom: 12px; border-bottom: 1px solid var(--border-color); }
        .post-author { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .post-content { font-size: 1rem; line-height: 1.5; margin-bottom: 12px; word-break: break-word; }
        .post-actions { display: flex; justify-content: space-between; border-top: 1px solid var(--border-color); padding-top: 12px; }
        .action-btn { display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--text-muted); font-size: 0.9rem; }
        .action-btn.active { color: var(--primary); }

        /* COMMENTS */
        .comments-bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; height: 85vh; background: var(--bg-glass-solid); border-top-left-radius: 20px; border-top-right-radius: 20px; z-index: 5000; transform: translateY(100%); transition: transform 0.3s; padding: 16px; display: flex; flex-direction: column; }
        .comments-bottom-sheet.active { transform: translateY(0); }
        .comments-list { flex: 1; overflow-y: auto; margin-bottom: 16px; display: flex; flex-direction: column; gap: 16px; }
        .comment-item { display: flex; gap: 10px; }
        .comment-bubble { background: var(--bg-body); padding: 10px 14px; border-radius: 18px; }
        .reply-item { margin-left: 40px; }

        /* MISC */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 6000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: var(--bg-glass-solid); padding: 20px; border-radius: var(--radius-xl); width: 90%; max-width: 400px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Auth -->
    <div id="auth-layout">
        <div class="auth-card">
            <div class="auth-logo">T</div>
            <h2 style="margin-bottom: 20px;">Masuk</h2>
            <form onsubmit="App.Auth.login(event)">
                <div class="form-group"><input type="email" class="form-input" id="login-email" placeholder="Email" required></div>
                <div class="form-group"><input type="password" class="form-input" id="login-pwd" placeholder="Password" required></div>
                <button type="submit" class="btn btn-primary btn-full">Masuk</button>
            </form>
        </div>
    </div>

    <!-- Main -->
    <div id="app-layout">
        <header class="app-header">
            <div class="header-top">
                <div class="header-left">
                    <h2 onclick="App.Router.navigate('feed')" style="cursor:pointer; color:var(--primary);">TechSocial</h2>
                </div>
                <div class="header-right">
                    <button class="icon-btn" onclick="App.UI.toggleMobileSearch()"><span class="material-symbols-outlined">search</span></button>
                    <button class="icon-btn" onclick="App.Theme.toggle()"><span class="material-symbols-outlined">dark_mode</span></button>
                    <button class="icon-btn" onclick="App.Router.navigate('profil')"><span class="material-symbols-outlined">account_circle</span></button>
                </div>
            </div>
            <div id="mobile-search-row" class="search-area" style="padding-top: 10px; display: none;">
                <input type="text" id="header-mobile-search" class="search-input-hidden active" placeholder="Cari postingan...">
            </div>
        </header>

        <main class="app-content">
            <div id="app-viewport"></div>
        </main>
    </div>

    <!-- Comments Sheet -->
    <div class="comments-bottom-sheet" id="comments-sheet">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <h3>Komentar</h3>
            <button class="icon-btn" onclick="App.Features.closeComments()"><span class="material-symbols-outlined">close</span></button>
        </div>
        <div class="comments-list" id="comments-injector"></div>
        <div class="comments-sheet-input-row" style="display:flex; gap:8px;">
            <input type="text" id="comment-input" class="form-input" placeholder="Tulis komentar..." style="margin-bottom:0; flex:1;">
            <button class="btn btn-primary" onclick="App.Features.submitComment()">Kirim</button>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="global-modal">
        <div class="modal-card" id="modal-content"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://waaufoxlimqtesmmjhyw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_X6icNByv3YFbekorwJ6kSw_SX0XUFM8';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const App = {
            init() {
                this.Theme.init();
                this.Auth.checkSession();
            },
            Theme: {
                init() { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light'); },
                toggle() {
                    const t = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t);
                }
            },
            UI: {
                toggleMobileSearch() {
                    document.getElementById('mobile-search-row').style.display = 
                        document.getElementById('mobile-search-row').style.display === 'flex' ? 'none' : 'flex';
                }
            },
            Auth: {
                async checkSession() {
                    const { data } = await supabase.auth.getSession();
                    if(data.session) {
                        document.getElementById('auth-layout').style.display = 'none';
                        document.getElementById('app-layout').style.display = 'grid';
                        App.Router.navigate('feed');
                    }
                },
                async login(e) {
                    e.preventDefault();
                    const email = document.getElementById('login-email').value;
                    const pwd = document.getElementById('login-pwd').value;
                    const { error } = await supabase.auth.signInWithPassword({ email, password: pwd });
                    if(error) alert(error.message);
                    else window.location.reload();
                },
                logout() { supabase.auth.signOut(); window.location.reload(); }
            },
            Router: {
                navigate(path) {
                    const viewport = document.getElementById('app-viewport');
                    if(path === 'feed') App.Features.renderFeed();
                    else if(path === 'profil') App.Features.renderProfile();
                }
            },
            Features: {
                async renderFeed() {
                    const { data } = await supabase.from('posts').select('*').order('created_at', {ascending: false});
                    document.getElementById('app-viewport').innerHTML = data.map(post => `
                        <div class="post-card">
                            <div class="post-author">
                                <img src="https://i.pravatar.cc/150?u=${post.author}" class="post-avatar">
                                <strong>${post.author}</strong>
                            </div>
                            <div class="post-content">${post.content}</div>
                            <div class="post-actions">
                                <span class="action-btn" onclick="App.Features.toggleLike(${post.id})">👍 Suka</span>
                                <span class="action-btn" onclick="App.Features.openComments(${post.id})">💬 Komentar</span>
                            </div>
                        </div>
                    `).join('');
                },
                async renderProfile() {
                    const email = localStorage.getItem('ns_user_email') || 'User';
                    document.getElementById('app-viewport').innerHTML = `
                        <div class="glass-card">
                            <div style="display:flex; justify-content:space-between;">
                                <h3>Profil</h3>
                                <button class="icon-btn" onclick="App.Router.navigate('settings')"><span class="material-symbols-outlined">settings</span></button>
                            </div>
                            <p>Email: ${email}</p>
                        </div>
                    `;
                },
                toggleLike(postId) {
                    // Placeholder logic untuk suka
                    App.Toast("Suka ditambahkan!");
                },
                openComments(postId) {
                    activeBottomSheetPostId = postId;
                    document.getElementById('comments-sheet').classList.add('active');
                    this.loadComments(postId);
                },
                closeComments() {
                    document.getElementById('comments-sheet').classList.remove('active');
                },
                async loadComments(postId) {
                    const { data } = await supabase.from('posts').select('role').eq('id', postId).single();
                    let role = { comments: [] };
                    if(data.role) role = typeof data.role === 'string' ? JSON.parse(data.role) : data.role;
                    
                    const container = document.getElementById('comments-injector');
                    container.innerHTML = role.comments.map(c => `
                        <div class="comment-item">
                            <div class="comment-bubble">
                                <strong>${c.user}</strong><br>${c.text}
                                <div style="margin-top:4px;">
                                    <span class="action-btn" onclick="App.Features.likeComment('${c.id}')" style="font-size:0.75rem;">Suka</span>
                                    <span class="action-btn" onclick="App.Features.replyTo('${c.id}')" style="font-size:0.75rem;">Balas</span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                },
                async submitComment() {
                    const text = document.getElementById('comment-input').value;
                    if(!text) return;
                    const user = App.ProfileState.getCurrentName();
                    
                    const { data } = await supabase.from('posts').select('role').eq('id', activeBottomSheetPostId).single();
                    let role = data.role ? (typeof data.role === 'string' ? JSON.parse(data.role) : data.role) : { comments: [] };
                    
                    role.comments.push({ id: Date.now(), user, text, likes: [], replies: [] });
                    
                    await supabase.from('posts').update({ role }).eq('id', activeBottomSheetPostId);
                    document.getElementById('comment-input').value = '';
                    this.loadComments(activeBottomSheetPostId);
                },
                likeComment(commentId) {
                    App.Toast("Suka diberikan pada komentar");
                },
                replyTo(commentId) {
                    activeReplyTargetCommentId = commentId;
                    document.getElementById('comment-input').placeholder = "Membalas...";
                },
                Toast(msg) { alert(msg); }
            }
        };

        String.prototype.hashCode = function() {
            let hash = 0; for (let i = 0; i < this.length; i++) hash = ((hash << 5) - hash) + this.charCodeAt(i); return hash;
        };

        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
