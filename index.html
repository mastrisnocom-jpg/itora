<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tech Social - Premium Social Workspace</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #01B574;
            --bg-body: #f4f9f6;
            --text-main: #0b2e1e;
            --text-muted: #7fa895;
            --bottom-nav-height: 70px;
            --sidebar-width: 280px;
            --trans-smooth: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* Layout Grid */
        #app-layout { display: grid; grid-template-areas: "sidebar header" "sidebar content"; grid-template-columns: var(--sidebar-width) 1fr; min-height: 100vh; }
        
        /* Header */
        .app-header { grid-area: header; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 999; border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        /* Sidebar */
        .app-sidebar { grid-area: sidebar; background: white; border-right: 1px solid rgba(0,0,0,0.05); padding: 20px; position: sticky; top: 0; height: 100vh; }

        /* Content */
        .app-content { grid-area: content; padding: 24px; }

        /* Bottom Nav (Khusus Mobile) */
        .bottom-nav { display: none; }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            #app-layout { grid-template-columns: 1fr; }
            .app-sidebar { position: fixed; left: -100%; top: 0; z-index: 2000; width: 280px; transition: var(--trans-smooth); }
            .app-sidebar.active { left: 0; }
            
            .bottom-nav { 
                display: flex !important; position: fixed; bottom: 0; left: 0; right: 0; 
                height: var(--bottom-nav-height); background: white; 
                border-top: 1px solid rgba(0,0,0,0.1); z-index: 1500;
                justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom);
            }
            .app-content { padding-bottom: calc(var(--bottom-nav-height) + 20px); }
        }

        .menu-item { display: flex; align-items: center; gap: 15px; padding: 12px; cursor: pointer; border-radius: 12px; transition: 0.2s; }
        .menu-item:hover { background: #f0f0f0; }
        .menu-item.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div id="app-layout">
        <aside class="app-sidebar" id="sidebar">
            <h2 style="margin-bottom: 30px; color: var(--primary);">Tech Social</h2>
            <div id="sidebar-menu-list">
                <div class="menu-item active" onclick="App.Router.navigate('feed')"><span class="material-symbols-outlined">home</span> Feed</div>
                <div class="menu-item" onclick="App.Router.navigate('explore')"><span class="material-symbols-outlined">search</span> Cari</div>
                <div class="menu-item" onclick="App.Router.navigate('settings')"><span class="material-symbols-outlined">settings</span> Setting</div>
            </div>
        </aside>

        <header class="app-header">
            <button id="menu-btn" style="border:none; background:none; cursor:pointer;"><span class="material-symbols-outlined">menu</span></button>
            <div style="font-weight: 700;">Dashboard Workspace</div>
            <img src="https://i.pravatar.cc/40" style="border-radius: 50%;">
        </header>

        <main class="app-content">
            <div id="app-viewport" style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
                <h1>Selamat Datang</h1>
                <p>Pilih menu di bawah atau samping untuk mulai.</p>
            </div>
        </main>

        <nav class="bottom-nav">
            <div onclick="App.Router.navigate('feed')"><span class="material-symbols-outlined">home</span></div>
            <div onclick="App.Router.navigate('explore')"><span class="material-symbols-outlined">search</span></div>
            <div onclick="App.UI.toggleChat(true)"><span class="material-symbols-outlined">chat</span></div>
            <div onclick="App.Router.navigate('settings')"><span class="material-symbols-outlined">person</span></div>
        </nav>
    </div>

    <script>
        const App = {
            init() {
                console.log("App Initialized");
                document.getElementById('menu-btn').addEventListener('click', () => {
                    document.getElementById('sidebar').classList.toggle('active');
                });
            },
            Router: {
                navigate(page) {
                    const viewport = document.getElementById('app-viewport');
                    viewport.innerHTML = `<h1>Halaman: ${page.toUpperCase()}</h1><p>Konten untuk ${page} akan dimuat di sini.</p>`;
                    document.getElementById('sidebar').classList.remove('active');
                }
            },
            UI: {
                toggleChat(status) {
                    alert("Fitur Chat Dibuka");
                }
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
