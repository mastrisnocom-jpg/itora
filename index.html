<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NexSphere - Enterprise Business & Social Cloud Suite</title>
    <!-- Material Symbols Outlined Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. CSS VARIABLES, CORE THEMES & RESET (FONT ARIAL 8pt/11px BASELINE)
           ========================================================================== */
        :root {
            --font-main: 'Arial', sans-serif;
            --base-font-size: 11px; /* 8pt Baseline */
            
            /* Light Theme Configuration */
            --bg-primary: #f1f5f9;
            --bg-surface: rgba(255, 255, 255, 0.8);
            --bg-surface-hover: rgba(255, 255, 255, 0.95);
            --border-color: rgba(226, 232, 240, 0.8);
            --text-main: #0f172a;
            --text-muted: #64748b;
            
            /* UI Color System Palette */
            --primary: #4f46e5;
            --primary-state: rgba(79, 70, 229, 0.08);
            --primary-container: #e0e7ff;
            --secondary: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #6366f1;
            
            /* Structural Foundations */
            --blur-radius: 12px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px -2px rgba(0,0,0,0.08);
            --shadow-lg: 0 16px 24px -6px rgba(0,0,0,0.12);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-round: 9999px;
            
            /* Screen Layout Constants */
            --header-height: 50px;
            --sidebar-width: 220px;
            --bottom-nav-height: 60px;
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-primary: #090d16;
            --bg-surface: rgba(20, 27, 41, 0.75);
            --bg-surface-hover: rgba(28, 37, 56, 0.9);
            --border-color: rgba(51, 65, 85, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #818cf8;
            --primary-state: rgba(129, 140, 248, 0.15);
            --primary-container: #1e1b4b;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px -2px rgba(0,0,0,0.5);
            --shadow-lg: 0 16px 24px -6px rgba(0,0,0,0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            font-size: var(--base-font-size);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }

        input, textarea, select, button {
            font-family: inherit;
            color: inherit;
            outline: none;
        }

        a { text-decoration: none; color: inherit; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: var(--radius-round); }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ==========================================================================
           2. MASTER LAYOUT ARCHITECTURE
           ========================================================================== */
        #app-layout {
            display: grid;
            grid-template-areas: 
                "header header"
                "sidebar content"
                "footer footer";
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: var(--header-height) 1fr auto;
            min-height: 100vh;
        }

        #app-layout.sidebar-collapsed {
            --sidebar-width: 60px;
        }

        .app-header {
            grid-area: header;
            background: var(--bg-surface);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--header-height);
            z-index: 1000;
            box-shadow: var(--shadow-sm);
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .brand-logo {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 13px;
        }

        .brand-name {
            font-size: 14px; font-weight: 700;
            background: linear-gradient(135deg, var(--text-main), var(--text-muted));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #app-layout.sidebar-collapsed .brand-name { display: none; }

        .search-container { position: relative; width: 220px; }
        .search-input {
            width: 100%; padding: 6px 10px 6px 28px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.02);
            transition: var(--transition-smooth);
        }
        [data-theme="dark"] .search-input { background: rgba(255, 255, 255, 0.02); }
        .search-input:focus { border-color: var(--primary); background: var(--bg-surface-hover); }
        .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .meta-clock-widget {
            display: flex; flex-direction: column; align-items: flex-end;
            border-right: 1px solid var(--border-color); padding-right: 12px;
        }
        .meta-time { font-weight: 700; color: var(--text-main); }

        .icon-action-btn {
            width: 32px; height: 32px; border-radius: var(--radius-sm);
            border: none; background: transparent; color: var(--text-main);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: var(--transition-smooth);
        }
        .icon-action-btn:hover { background: var(--primary-state); color: var(--primary); }
        .icon-action-btn .badge-dot {
            position: absolute; top: 6px; right: 6px; width: 6px; height: 6px;
            background: var(--danger); border-radius: var(--radius-round);
        }

        .app-sidebar {
            grid-area: sidebar;
            background: var(--bg-surface);
            backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border-right: 1px solid var(--border-color);
            position: fixed; top: var(--header-height); left: 0; bottom: 0;
            width: var(--sidebar-width); z-index: 999;
            transition: var(--transition-smooth);
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 12px 0; box-shadow: var(--shadow-sm);
        }

        .sidebar-menu-wrapper { display: flex; flex-direction: column; gap: 2px; padding: 0 6px; }
        
        .menu-item {
            display: flex; align-items: center; gap: 10px; padding: 8px 12px;
            border-radius: var(--radius-sm); color: var(--text-muted);
            cursor: pointer; transition: var(--transition-smooth);
            position: relative; overflow: hidden;
        }
        .menu-item:hover { background: var(--primary-state); color: var(--primary); }
        .menu-item.active {
            background: var(--primary); color: white; font-weight: bold;
            box-shadow: 0 2px 6px rgba(79, 70, 229, 0.2);
        }

        #app-layout.sidebar-collapsed .menu-text { display: none; }

        .sidebar-user-card {
            margin: 0 6px; padding: 8px; background: rgba(0, 0, 0, 0.02);
            border-radius: var(--radius-sm); display: flex; align-items: center; gap: 8px;
            border: 1px solid var(--border-color);
        }
        [data-theme="dark"] .sidebar-user-card { background: rgba(255, 255, 255, 0.02); }
        .avatar-frame {
            position: relative; width: 28px; height: 28px;
            border-radius: var(--radius-round); padding: 1px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
        }
        .avatar-img { width: 100%; height: 100%; border-radius: var(--radius-round); object-fit: cover; }
        .user-meta-info { display: flex; flex-direction: column; overflow: hidden; }
        .user-display-name { font-weight: 600; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .user-role-lbl { font-size: 9px; color: var(--text-muted); }
        #app-layout.sidebar-collapsed .sidebar-user-card { padding: 4px; justify-content: center; }
        #app-layout.sidebar-collapsed .user-meta-info { display: none; }

        .app-content {
            grid-area: content; margin-top: var(--header-height); margin-left: var(--sidebar-width);
            padding: 16px; min-height: calc(100vh - var(--header-height) - 35px);
            transition: var(--transition-smooth);
        }

        .app-footer {
            grid-area: footer; background: var(--bg-surface);
            border-top: 1px solid var(--border-color); margin-left: var(--sidebar-width);
            padding: 8px 16px; display: flex; justify-content: space-between;
            align-items: center; color: var(--text-muted); transition: var(--transition-smooth);
        }

        .network-status-badge { display: flex; align-items: center; gap: 4px; font-weight: bold; }
        .status-dot { width: 6px; height: 6px; border-radius: var(--radius-round); background: var(--success); }
        .status-dot.offline { background: var(--danger); }

        .bottom-nav { display: none; }

        /* ==========================================================================
           3. UI STYLING & COMPONENTS (MATERIAL 3 GLASS CONFIGURATION)
           ========================================================================== */
        .view-container { animation: fadeIn 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        .grid-dashboard { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
        
        .premium-card {
            background: var(--bg-surface); backdrop-filter: blur(var(--blur-radius));
            -webkit-backdrop-filter: blur(var(--blur-radius));
            border: 1px solid var(--border-color); border-radius: var(--radius-md);
            padding: 16px; box-shadow: var(--shadow-sm); transition: var(--transition-smooth);
            margin-bottom: 16px; position: relative;
        }
        .premium-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }

        .welcome-gradient-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none;
        }
        .welcome-gradient-card * { color: white !important; }

        .stats-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .stat-box {
            background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 12px; display: flex; align-items: center; gap: 12px;
        }
        .stat-icon-wrapper {
            width: 32px; height: 32px; border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
        }

        .btn-suite {
            padding: 6px 12px; border-radius: var(--radius-sm); border: none;
            font-weight: 600; cursor: pointer; display: inline-flex;
            align-items: center; gap: 6px; justify-content: center;
            transition: var(--transition-smooth); position: relative; overflow: hidden;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: rgba(0,0,0,0.05); color: var(--text-main); }
        [data-theme="dark"] .btn-secondary { background: rgba(255,255,255,0.05); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-suite:disabled { opacity: 0.5; cursor: not-allowed; }

        .form-group-floating { position: relative; margin-bottom: 12px; }
        .form-control-input {
            width: 100%; padding: 8px 10px; border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); background: transparent; transition: var(--transition-smooth);
        }
        .form-control-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-state); }
        
        .table-panel-holder { width: 100%; overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border-color); }
        .premium-table { width: 100%; border-collapse: collapse; text-align: left; }
        .premium-table th {
            background: rgba(0,0,0,0.02); padding: 8px 12px; font-weight: 700;
            color: var(--text-muted); border-bottom: 2px solid var(--border-color);
            cursor: pointer; user-select: none;
        }
        [data-theme="dark"] .premium-table th { background: rgba(255, 255, 255, 0.02); }
        .premium-table td { padding: 8px 12px; border-bottom: 1px solid var(--border-color); }
        .premium-table tr:hover td { background: var(--primary-state); }

        /* Social & Chat Layout Components */
        .post-composer-area { display: flex; flex-direction: column; gap: 8px; }
        .composer-textarea { width: 100%; min-height: 60px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: rgba(0,0,0,0.01); padding: 8px; resize: none; }
        .post-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .post-author-block { display: flex; align-items: center; gap: 8px; }
        .post-content-body { line-height: 1.5; margin-bottom: 10px; white-space: pre-wrap; }
        .post-media-attachment { width: 100%; max-height: 220px; border-radius: var(--radius-sm); object-fit: cover; margin-bottom: 10px; border: 1px solid var(--border-color); }
        .post-actions-bar { display: flex; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 4px 0; gap: 4px; }
        .action-trigger-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 6px; border: none; background: transparent; cursor: pointer; color: var(--text-muted); }
        .action-trigger-btn.active-liked { color: var(--danger); font-weight: bold; }
        .comments-section { background: rgba(0, 0, 0, 0.01); border-radius: var(--radius-sm); padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .comment-node { display: flex; gap: 8px; margin-bottom: 4px; }
        .comment-bubble { background: var(--bg-surface-hover); border: 1px solid var(--border-color); padding: 6px 10px; border-radius: 4px; flex: 1; }

        .chat-module-container {
            display: grid; grid-template-columns: 180px 1fr; border: 1px solid var(--border-color);
            border-radius: var(--radius-md); background: var(--bg-surface); height: calc(100vh - var(--header-height) - 100px); overflow: hidden;
        }
        .chat-channels-list { border-right: 1px solid var(--border-color); overflow-y: auto; display: flex; flex-direction: column; }
        .channel-row { display: flex; align-items: center; gap: 8px; padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border-color); }
        .channel-row.active { background: var(--primary-state); font-weight: bold; }
        .chat-viewport { display: flex; flex-direction: column; justify-content: space-between; background: rgba(0,0,0,0.01); }
        .chat-messages-stream { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg-packet { display: flex; flex-direction: column; max-width: 70%; gap: 2px; }
        .msg-packet.incoming { align-self: flex-start; }
        .msg-packet.outgoing { align-self: flex-end; align-items: flex-end; }
        .msg-payload { padding: 8px 12px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); }
        .incoming .msg-payload { background: var(--bg-surface); border: 1px solid var(--border-color); }
        .outgoing .msg-payload { background: var(--primary); color: white; }
        .msg-timestamp { font-size: 9px; color: var(--text-muted); }
        .chat-composer-strip { padding: 10px 16px; background: var(--bg-surface); border-top: 1px solid var(--border-color); display: flex; gap: 8px; align-items: center; }

        /* Modal Overlay & Toasts */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.3); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: var(--transition-smooth);
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-sheet-box { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-lg); width: 90%; max-width: 400px; padding: 16px; box-shadow: var(--shadow-lg); }
        
        #toast-container { position: fixed; top: 16px; right: 16px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast-node { background: var(--bg-surface); border-left: 4px solid var(--primary); box-shadow: var(--shadow-lg); padding: 10px 16px; border-radius: var(--radius-sm); display: flex; align-items: center; gap: 10px; min-width: 240px; pointer-events: auto; }

        .ripple { position: absolute; background: rgba(255, 255, 255, 0.35); border-radius: var(--radius-round); transform: scale(0); animation: ripple-anim 0.5s linear; pointer-events: none; }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        .dropdown-menu-sheet { position: absolute; top: var(--header-height); right: 16px; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-md); min-width: 140px; box-shadow: var(--shadow-lg); display: none; flex-direction: column; padding: 4px; z-index: 1005; }
        .dropdown-menu-sheet.active { display: flex; }
        .dropdown-item-node { padding: 6px 10px; border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .dropdown-item-node:hover { background: var(--primary-state); color: var(--primary); }

        /* Skeleton Loading */
        .skeleton-line { height: 12px; margin-bottom: 6px; background: linear-gradient(90deg, rgba(0,0,0,0.06) 25%, rgba(0,0,0,0.12) 50%, rgba(0,0,0,0.06) 75%); background-size: 200% 100%; animation: loading-skeleton 1.5s infinite; border-radius: 4px; }
        @keyframes loading-skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ==========================================================================
           4. ADAPTIVE RESPONSIVENESS MEDIA INTERFACES HUB
           ========================================================================== */
        @media (max-width: 992px) {
            #app-layout { grid-template-columns: 60px 1fr; }
            .app-sidebar { width: 60px; }
            .brand-name, .menu-text, .user-meta-info { display: none; }
            .app-content, .app-footer { margin-left: 60px; }
        }

        @media (max-width: 768px) {
            #app-layout { grid-template-areas: "header header" "content content"; grid-template-columns: 1fr; }
            .app-sidebar, .app-footer { display: none; }
            .app-content { margin-left: 0; padding: 12px; padding-bottom: calc(var(--bottom-nav-height) + 12px); }
            .grid-dashboard { grid-template-columns: 1fr; }
            .bottom-nav {
                display: flex; position: fixed; bottom: 0; left: 0; right: 0;
                height: var(--bottom-nav-height); background: var(--bg-surface);
                backdrop-filter: blur(var(--blur-radius)); border-top: 1px solid var(--border-color);
                z-index: 1000; padding-bottom: env(safe-area-inset-bottom); justify-content: space-around; align-items: center;
            }
            .bottom-nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 9px; gap: 2px; flex: 1; padding: 4px 0; cursor: pointer; }
            .bottom-nav-item.active { color: var(--primary); font-weight: bold; }
            .premium-table-container th { display: none; }
            .premium-table-container tr { display: block; margin-bottom: 8px; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-surface); }
            .premium-table-container td { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding: 8px 12px; }
            .premium-table-container td::before { content: attr(data-label); font-weight: 700; color: var(--text-muted); text-align: left; }
            .chat-module-container { grid-template-columns: 1fr; }
            .chat-channels-list { display: none; }
        }
    </style>
</head>
<body>

    <div id="app-layout">
        <!-- HEADER TOP NAVBAR -->
        <header class="app-header">
            <div class="header-left">
                <div class="brand-wrapper" onclick="App.Router.navigate('dashboard')">
                    <div class="brand-logo">N</div>
                    <span class="brand-name">NexSphere</span>
                </div>
                <button class="icon-action-btn" id="sidebar-toggle-trigger">
                    <span class="material-symbols-outlined" style="font-size:16px;">menu</span>
                </button>
                <div class="search-container">
                    <span class="material-symbols-outlined search-icon" style="font-size:14px;">search</span>
                    <input type="text" class="search-input" placeholder="Cari data server..." id="global-search-engine">
                </div>
            </div>
            
            <div class="header-right">
                <div class="meta-clock-widget">
                    <span id="live-date-str">Memuat Tanggal...</span>
                    <span id="live-clock-str" class="meta-time">00:00:00 WIB</span>
                </div>
                <button class="icon-action-btn" id="refresh-view-trigger"><span class="material-symbols-outlined" style="font-size:16px;">refresh</span></button>
                <button class="icon-action-btn" id="theme-toggle-trigger"><span class="material-symbols-outlined" style="font-size:16px;">dark_mode</span></button>
                <button class="icon-action-btn" id="fullscreen-toggle-trigger"><span class="material-symbols-outlined" style="font-size:16px;">fullscreen</span></button>
                <button class="icon-action-btn" id="notification-bell-trigger"><span class="material-symbols-outlined" style="font-size:16px;">notifications</span><span class="badge-dot"></span></button>
                <div class="avatar-frame" id="profile-dropdown-trigger" style="cursor:pointer;">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80" alt="Avatar Operator" class="avatar-img">
                </div>
            </div>
        </header>

        <!-- FLOATING PROFILE DROPDOWN MENU -->
        <div class="dropdown-menu-sheet" id="profile-dropdown-sheet">
            <div class="dropdown-item-node" onclick="App.Router.navigate('profil')"><span class="material-symbols-outlined" style="font-size:14px;">person</span>Profil Akun</div>
            <div class="dropdown-item-node" onclick="App.Router.navigate('pengaturan')"><span class="material-symbols-outlined" style="font-size:14px;">settings</span>Pengaturan</div>
            <hr style="border:none; border-top:1px solid var(--border-color); margin:4px 0;">
            <div class="dropdown-item-node" onclick="App.Auth.logout()" style="color:var(--danger);"><span class="material-symbols-outlined" style="font-size:14px;">logout</span>Keluar Sistem</div>
        </div>

        <!-- LEFT SIDEBAR CONTAINER -->
        <aside class="app-sidebar">
            <div class="sidebar-menu-wrapper" id="sidebar-menu-injector"></div>
            <div class="sidebar-user-card">
                <div class="avatar-frame">

    <!-- ==========================================================================

    <script>
        /**
         * KREDENSIAL UTAMA DATABASE SUPABASE REST API (CONFIGURED BY USER GENERATOR)
         */
        const SUPABASE_URL = "https://waaufoxlimqtesmmjhyw.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_X6icNByv3YFbekorwJ6kSw_SX0XUFM8";

        /**
         * NETWORK CLIENT CORE MATRIX DENGAN SYSTEM SINKRONISASI FALLBACK OTOMATIS
         */
        const SupabaseClientEngine = {
            getHeaders() {
                return {
                    "apikey": SUPABASE_ANON_KEY,
                    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                    "Content-Type": "application/json",
                    "Prefer": "return=representation"
                };
            },
            async select(table, selectQuery = "*", orderColumn = "created_at") {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=${selectQuery}&order=${orderColumn}.desc`, {
                        method: "GET",
                        headers: this.getHeaders()
                    });
                    if (!response.ok) throw new Error("Supabase Fetch Error");
                    return await response.json();
                } catch (err) {
                    console.warn("Menggunakan database lokal cache fallback.");
                    return this.LocalCache.get(table);
                }
            },
            async insert(table, payload) {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
                        method: "POST",
                        headers: this.getHeaders(),
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    this.LocalCache.syncInsert(table, data[0] || payload);
                    return data;
                } catch (err) {
                    this.LocalCache.syncInsert(table, payload);
                    return [payload];
                }
            },
            async update(table, payload, matchColumn, matchValue) {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${matchColumn}=eq.${matchValue}`, {
                        method: "PATCH",
                        headers: this.getHeaders(),
                        body: JSON.stringify(payload)
                    });
                    return await response.json();
                } catch (err) {
                    return null;
                }
            },
            LocalCache: {
                get(table) {
                    return JSON.parse(localStorage.getItem(`sb_${table}`)) || [];
                },
                syncInsert(table, data) {
                    const current = this.get(table);
                    current.unshift(data);
                    localStorage.setItem(`sb_${table}`, JSON.stringify(current));
                }
            }
        };

        // Navigation Master Registry Array Mapping List Layout Configuration Elements
        const AppNavigationRegistry = [
            { id: 'dashboard', label: 'Dashboard', icon: 'dashboard' },
            { id: 'social-feed', label: 'Social Feed', icon: 'share' },
            { id: 'chat-room', label: 'Ruang Chat', icon: 'forum' },
            { id: 'master-data', label: 'Master Data', icon: 'database' },
            { id: 'transaksi', label: 'Transaksi POS', icon: 'shopping_cart' },
            { id: 'laporan', label: 'Laporan Finansial', icon: 'analytics' },
            { id: 'absensi', label: 'Absensi Tim', icon: 'badge' },

            { id: 'profil', label: 'Profil Saya', icon: 'account_circle' }

        // Central Kernel Application Namespace Matrix Systems Logic Controller
        const App = {
            async init() {
                this.Theme.init();
                this.Clock.start();
                this.Navigation.render();
                this.Router.init();
                this.Events.bindGlobal();
                this.Network.listen();
                
                const cachedUser = localStorage.getItem('sb_user_cache') || "Kartika Dewi";
                document.getElementById('sidebar-user-name').innerText = cachedUser;
                App.Toast.show("Portal Supabase Cloud Engine Terkoneksi Penuh", "success");
            },

            Network: {
                listen() {
                    const toggleStateStatus = () => {
                        const dot = document.getElementById('network-indicator-dot');
                        const lbl = document.getElementById('network-indicator-lbl');
                        if (navigator.onLine) {
                            dot.className = "status-dot"; lbl.innerText = "Koneksi Aktif";
                        } else {
                            dot.className = "status-dot offline"; lbl.innerText = "Koneksi Offline";
                            App.Toast.show("Koneksi cloud terputus, beralih ke engine offline local storage.", "warning");
                        }
                    };
                    window.addEventListener('online', toggleStateStatus);
                    window.addEventListener('offline', toggleStateStatus);
                }
            },

            // SPA Native Hash Router Subsystem Controller Framework Architecture
            Router: {
                init() {
                    window.addEventListener('hashchange', () => this.executeRouteTransition());
                    this.executeRouteTransition();
                },
                navigate(viewId) { window.location.hash = `#/${viewId}`; },
                executeRouteTransition() {
                    const hash = window.location.hash.replace('#/', '') || 'dashboard';
                    document.querySelectorAll('.menu-item, .bottom-nav-item').forEach(el => {
                        el.classList.toggle('active', el.getAttribute('data-view-target') === hash);
                    });

                    const viewport = document.getElementById('app-viewport-root');
                    if (this.views[hash]) {
                        viewport.innerHTML = `<div class="view-container">${this.views[hash]()}</div>`;
                        if(this.viewHooks[hash]) this.viewHooks[hash]();
                    } else {
                        viewport.innerHTML = `<div class="premium-card"><h3>Modul Enkripsi Tidak Ditemukan</h3></div>`;
                    }
                },

                // Dynamic Workspace Layout View Modules HTML Rendering Layout Parser Matrix
                views: {
                    dashboard() {
                        return `
                            <div class="premium-card welcome-gradient-card">

                                <p style="margin-top: 4px; opacity:0.9;">Monitoring data terenkripsi, status real-time, master logistik pergudangan, interaksi tim internal terintegrasi Supabase Cloud.</p>
                            </div>

                                    <div class="stat-icon-wrapper" style="background:var(--primary-state); color:var(--primary);"><span class="material-symbols-outlined" style="font-size:16px;">share</span></div>
                                    <div><h3 style="font-weight:700;">Supabase Data Live</h3><p style="color:var(--text-muted); font-size:9px;">Komunitas Sinkron</p></div>
                                </div>

                                </div>

                                        <div style="flex:1; background:var(--secondary); height:90%;"></div>
                                        <div style="flex:1; background:var(--success); height:45%;"></div>
                                    </div>
                                </div>
                                <div class="premium-card">

                    'social-feed'() {

                            <div id="social-feed-stream-injector"><div class="skeleton-line"></div><div class="skeleton-line"></div></div>
                        `;
                    },
                    'chat-room'() {
                        return `

                                    <div class="channel-row active"><span class="material-symbols-outlined" style="font-size:14px;">groups</span><div><div style="font-weight:600;">Grup Utama Divisi</div></div></div>
                                </div>
                                <div class="chat-viewport">
                                    <div class="chat-messages-stream" id="chat-messages-stream-node"></div>
                                    <div class="chat-composer-strip">
                                        <input type="text" class="form-control-input" id="chat-composer-input-message" placeholder="Tulis pesan obrolan realtime..." onkeypress="if(event.key==='Enter') App.ChatModule.executeSend()">
                                        <button class="btn-suite btn-primary" onclick="App.ChatModule.executeSend()"><span class="material-symbols-outlined" style="font-size:14px;">send</span></button>
                                    </div>

                        `;

                    'master-data'() {
                        return `

                                    <button class="btn-suite btn-secondary" onclick="App.TableDataModule.exportCSVData()">Export CSV</button>

                                            <tr><th>Kode SKU</th><th>Nama Item</th><th>Kategori</th><th>Stok</th><th>Harga Satuan</th></tr>
                                        </thead>
                                        <tbody id="master-data-table-rows-injector"></tbody>
                                    </table>
                                </div>
                            </div>
                        `;
                    },
                    transaksi() {

                            <div class="premium-card" style="max-width:500px;">

                            </div>
                        `;
                    },
                    laporan() { return `<div class="premium-card"><h3>Laporan Finansial Pembukuan Neraca Kas</h3></div>`; },
                    absensi() { return `<div class="premium-card"><h3>Sistem Kontrol Absensi Kehadiran Karyawan</h3></div>`; },

                    profil() { return `<div class="premium-card"><h3>Informasi Akun Enkripsi Root Operator</h3></div>`; }

                // Active lifecycle routing execution hooks modules parameters view
                viewHooks: {
                    'social-feed'() { App.FeedModule.renderStream(); },
                    'chat-room'() { App.ChatModule.renderStream(); },
                    'master-data'() { App.TableDataModule.renderRows(); }

            },

            // Navigation Renderer Component Layout System Modules Engine mapping maps list array
            Navigation: {
                render() {
                    const side = document.getElementById('sidebar-menu-injector');
                    const bottom = document.getElementById('bottom-nav-injector');
                    let sHtml = '', bHtml = '';
                    
                    AppNavigationRegistry.forEach(m => {
                        sHtml += `<a class="menu-item" data-view-target="${m.id}" onclick="App.Router.navigate('${m.id}')"><span class="material-symbols-outlined" style="font-size:16px;">${m.icon}</span><span class="menu-text">${m.label}</span></a>`;
                        if(['dashboard', 'social-feed', 'chat-room', 'pengaturan'].includes(m.id)) {
                            bHtml += `<a class="bottom-nav-item" data-view-target="${m.id}" onclick="App.Router.navigate('${m.id}')"><span class="material-symbols-outlined" style="font-size:16px;">${m.icon}</span><span>${m.label}</span></a>`;
                        }
                    });
                    side.innerHTML = sHtml; bottom.innerHTML = bHtml;
                }
            },

            // Clock Engine real time update synchronization parameters elements
            Clock: {
                start() {
                    const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
                    const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
                    setInterval(() => {
                        const now = new Date();
                        document.getElementById('live-date-str').innerText = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
                        document.getElementById('live-clock-str').innerText = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')} WIB`;
                        document.getElementById('footer-year-sync').innerText = now.getFullYear();
                    }, 1000);
                }
            },

            Theme: {
                init() {
                    const cache = localStorage.getItem('sb_theme') || 'light';
                    document.documentElement.setAttribute('data-theme', cache);
                },
                toggle() {
                    const curr = document.documentElement.getAttribute('data-theme');
                    const next = curr === 'light' ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', next);
                    localStorage.setItem('sb_theme', next);
                    App.Toast.show(`Tema beralih ke mode ${next}`, "info");
                }
            },

            // Social Feed Database Layer Controller Component Modules Engine Integration
            FeedModule: {
                imgCache: null,
                handleImagePreview(input) {
                    if (input.files && input.files[0]) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            this.imgCache = e.target.result;
                            document.getElementById('composer-image-preview-target').innerHTML = `<img src="${e.target.result}" style="width:40px; height:40px; object-fit:cover; border-radius:4px;">`;
                        };
                        reader.readAsDataURL(input.files[0]);
                    }
                },
                async executeCreatePost() {
                    const node = document.getElementById('post-text-body-field');
                    if(!node.value.trim()) return App.Toast.show("Konten deskripsi kosong!", "warning");
                    
                    const payload = {
                        author: localStorage.getItem('sb_user_cache') || "Kartika Dewi",
                        avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80",
                        body: node.value,
                        media: this.imgCache,
                        likes: 0
                    };
                    
                    await SupabaseClientEngine.insert('posts', payload);
                    node.value = ''; this.imgCache = null;
                    document.getElementById('composer-image-preview-target').innerHTML = '';
                    this.renderStream();
                    App.Toast.show("Post sukses disinkronisasikan ke Supabase", "success");
                },
                async renderStream() {
                    const target = document.getElementById('social-feed-stream-injector');
                    if(!target) return;
                    
                    const data = await SupabaseClientEngine.select('posts', '*', 'created_at');
                    let html = '';
                    data.forEach(post => {
                        html += `
                            <article class="premium-card">
                                <div class="post-card-header">
                                    <div class="post-author-block">
                                        <div class="avatar-frame" style="width:24px; height:24px;"><img src="${post.avatar}" class="avatar-img"></div>
                                        <div><h4 style="font-weight:700;">${post.author}</h4></div>
                                    </div>
                                </div>
                                <div class="post-content-body">${post.body}</div>
                                ${post.media ? `<img src="${post.media}" class="post-media-attachment">` : ''}
                            </article>
                        `;
                    });
                    target.innerHTML = html || '<p style="color:var(--text-muted)">Belum ada postingan dari database cloud.</p>';
                }
            },

            // Chat Subsystem Engine Modules integration layer control methods lists
            ChatModule: {
                async executeSend() {
                    const node = document.getElementById('chat-composer-input-message');
                    if(!node.value.trim()) return;
                    
                    const payload = {
                        sender: localStorage.getItem('sb_user_cache') || "Kartika Dewi",
                        msg: node.value
                    };
                    
                    await SupabaseClientEngine.insert('chats', payload);
                    node.value = ''; this.renderStream();
                },
                async renderStream() {
                    const view = document.getElementById('chat-messages-stream-node');
                    if(!view) return;
                    
                    const data = await SupabaseClientEngine.select('chats', '*', 'created_at');
                    let html = '';
                    data.reverse().forEach(c => {
                        const isMe = c.sender === (localStorage.getItem('sb_user_cache') || "Kartika Dewi");
                        html += `
                            <div class="msg-packet ${isMe ? 'outgoing' : 'incoming'}">
                                <span style="font-size:9px; color:var(--text-muted); font-weight:bold;">${c.sender}</span>
                                <div class="msg-payload">${c.msg}</div>
                            </div>
                        `;
                    });
                    view.innerHTML = html;
                    view.scrollTop = view.scrollHeight;
                }

                async renderRows() {

                    });
                    target.innerHTML = html;

                exportCSVData() {
                    App.Toast.show("Mengekspor berkas CSV logistik data master...", "info");

            POSModule: {
                runKalkulasi() {
                    const val = parseFloat(document.getElementById('pos-select-product').value);
                    document.getElementById('pos-invoice-total-display').innerText = `Rp ${val.toLocaleString('id-ID')}`;

            SettingsModule: {
                executeSave() {
                    const value = document.getElementById('setting-operator-name-field').value;
                    if(!value.trim()) return;
                    localStorage.setItem('sb_user_cache', value);
                    document.getElementById('sidebar-user-name').innerText = value;
                    App.Toast.show("Konfigurasi tersimpan sukses", "success");

            Toast: {
                show(msg, type = "info") {
                    const container = document.getElementById('toast-container');
                    const node = document.createElement('div');
                    node.className = 'toast-node';
                    node.style.borderLeftColor = type === 'success' ? 'var(--success)' : 'var(--primary)';
                    node.innerHTML = `<span class="material-symbols-outlined" style="font-size:14px;">info</span><span style="font-weight:600;">${msg}</span>`;
                    container.appendChild(node);
                    setTimeout(() => { node.remove(); }, 3000);

            Auth: {
                logout() { localStorage.clear(); window.location.reload(); }

            Events: {

        window.addEventListener('DOMContentLoaded', () => App.init());
