<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LitePOS - Mobile & Desktop</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS SDK CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .active-menu { background-color: #374151; border-left: 4px solid #3b82f6; }
        @media (max-width: 767px) {
            .active-menu { border-left: none; border-bottom: 4px solid #3b82f6; }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- SIDEBAR NAVIGATION -->
    <aside class="w-full md:w-64 bg-gray-800 flex flex-row md:flex-col justify-between border-t md:border-t-0 md:border-r border-gray-700 order-last md:order-first z-50">
        <div class="flex flex-row md:flex-col w-full">
            <!-- Logo (Hidden on mobile) -->
            <div class="hidden md:flex p-5 items-center gap-3 border-b border-gray-700 w-full">
                <i class="fa-solid fa-cash-register text-blue-500 text-2xl"></i>
                <span class="text-xl font-bold tracking-wider text-white">LitePOS</span>
            </div>
            <!-- Menu Items -->
            <nav class="flex flex-row md:flex-col justify-around md:justify-start w-full mt-0 md:mt-6 px-2 md:px-3 py-2 md:py-0 space-x-2 md:space-x-0 md:space-y-1">
                <button onclick="switchTab('dashboard')" id="btn-dashboard" class="active-menu flex-1 md:flex-none flex flex-col md:flex-row items-center gap-1 md:gap-3 px-2 md:px-4 py-2 md:py-3 text-gray-300 hover:bg-gray-700 rounded-lg transition-all text-center md:text-left text-xs md:text-sm cursor-pointer">
                    <i class="fa-solid fa-chart-pie text-lg md:text-base text-blue-400"></i> <span class="block md:inline">Dashboard</span>
                </button>
                <button onclick="switchTab('pos')" id="btn-pos" class="flex-1 md:flex-none flex flex-col md:flex-row items-center gap-1 md:gap-3 px-2 md:px-4 py-2 md:py-3 text-gray-300 hover:bg-gray-700 rounded-lg transition-all text-center md:text-left text-xs md:text-sm cursor-pointer">
                    <i class="fa-solid fa-cart-shopping text-lg md:text-base text-emerald-400"></i> <span class="block md:inline">Kasir</span>
                </button>
                <button onclick="switchTab('products')" id="btn-products" class="flex-1 md:flex-none flex flex-col md:flex-row items-center gap-1 md:gap-3 px-2 md:px-4 py-2 md:py-3 text-gray-300 hover:bg-gray-700 rounded-lg transition-all text-center md:text-left text-xs md:text-sm cursor-pointer">
                    <i class="fa-solid fa-boxes-stacked text-lg md:text-base text-amber-400"></i> <span class="block md:inline">Stok</span>
                </button>
            </nav>
        </div>
        <!-- Connection Status (Hidden on mobile) -->
        <div class="hidden md:block p-4 border-t border-gray-700 bg-gray-850">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-xs text-gray-400">Database Ready</span>
            </div>
        </div>
    </aside>

    <!-- MAIN APP AREA -->
    <main class="flex-1 flex flex-col overflow-hidden">
        
        <!-- HEADER -->
        <header class="h-14 md:h-16 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-4 md:px-6">
            <h1 id="page-title" class="text-base md:text-lg font-semibold text-white">Dashboard Overview</h1>
            <div class="flex items-center gap-2 md:gap-4">
                <span class="text-xs md:text-sm text-gray-400"><i class="fa-regular fa-calendar mr-1"></i> <span id="current-date">--/--</span></span>
                <div class="h-6 w-px bg-gray-700 hidden sm:block"></div>
                <span class="text-xs md:text-sm font-medium bg-gray-700 px-2.5 py-1 rounded-full"><i class="fa-solid fa-user-tie text-blue-400 mr-1"></i> Admin</span>
            </div>
        </header>

        <!-- DYNAMIC CONTENT CONTAINERS -->
        <div class="flex-1 overflow-y-auto p-4 md:p-6 bg-gray-900 pb-24 md:pb-6">
            
            <!-- VIEW 1: DASHBOARD -->
            <section id="view-dashboard" class="space-y-6">
                <!-- Top Matrix Cards -->
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4">
                    <div class="bg-gray-800 p-4 md:p-5 rounded-xl border border-gray-700 shadow-lg">
                        <p class="text-[10px] md:text-xs text-gray-400 uppercase font-semibold">Pendapatan</p>
                        <h3 id="dash-revenue" class="text-base md:text-2xl font-bold mt-1 text-white">Rp 0</h3>
                    </div>
                    <div class="bg-gray-800 p-4 md:p-5 rounded-xl border border-gray-700 shadow-lg">
                        <p class="text-[10px] md:text-xs text-gray-400 uppercase font-semibold">Transaksi</p>
                        <h3 id="dash-tx-count" class="text-base md:text-2xl font-bold mt-1 text-white">0 Tx</h3>
                    </div>
                    <div class="bg-gray-800 p-4 md:p-5 rounded-xl border border-gray-700 shadow-lg">
                        <p class="text-[10px] md:text-xs text-gray-400 uppercase font-semibold">Stok Tipis</p>
                        <h3 id="dash-low-stock" class="text-base md:text-2xl font-bold mt-1 text-amber-500">0 Item</h3>
                    </div>
                    <div class="bg-gray-800 p-4 md:p-5 rounded-xl border border-gray-700 shadow-lg">
                        <p class="text-[10px] md:text-xs text-gray-400 uppercase font-semibold">Metode</p>
                        <h3 id="dash-payment-method" class="text-base md:text-2xl font-bold mt-1 text-purple-400">QRIS</h3>
                    </div>
                </div>

                <!-- Recent Logs Table -->
                <div class="bg-gray-800 rounded-xl border border-gray-700 p-4 md:p-5">
                    <h3 class="text-sm md:text-md font-semibold text-white mb-3"><i class="fa-solid fa-clock-rotate-left text-gray-400 mr-2"></i> Log Penjualan Hari Ini</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs md:text-sm text-gray-400 min-w-[400px]">
                            <thead class="bg-gray-750 text-gray-300 uppercase text-[10px] md:text-xs border-b border-gray-700">
                                <tr>
                                    <th class="py-2.5 px-3">Invoice</th>
                                    <th class="py-2.5 px-3">Waktu</th>
                                    <th class="py-2.5 px-3">Metode</th>
                                    <th class="py-2.5 px-3 text-right">Total</th>
                                </tr>
                            </thead>
                            <tbody id="realtime-tx-table">
                                <tr><td colspan="4" class="py-4 text-center text-gray-500">Belum ada transaksi masuk.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- VIEW 2: MESIN KASIR -->
            <section id="view-pos" class="hidden h-full flex flex-col lg:flex-row gap-4 overflow-hidden relative">
                <!-- Left Column: Catalog & Search -->
                <div class="flex-1 flex flex-col gap-3 overflow-hidden">
                    <div class="relative w-full">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-3 text-gray-500 text-sm"></i>
                        <input type="text" id="barcode-search" placeholder="Cari nama barang atau scan..." class="w-full pl-10 pr-4 py-2 bg-gray-800 border border-gray-700 rounded-xl focus:outline-none focus:border-blue-500 text-white placeholder-gray-500 text-sm">
                    </div>
                    <!-- Catalog Grid -->
                    <div id="product-grid" class="flex-1 grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-3 overflow-y-auto pr-1">
                        <!-- Rendered by JS -->
                    </div>
                </div>

                <!-- Right Column: Cart Panel -->
                <div id="cart-sidebar" class="fixed lg:relative inset-y-0 right-0 w-full sm:w-96 lg:w-80 xl:w-96 bg-gray-800 border-l lg:border border-gray-700 lg:rounded-2xl flex flex-col justify-between transform translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out z-50 lg:z-0 shadow-2xl lg:shadow-none">
                    <div class="p-4 border-b border-gray-700 bg-gray-750 flex justify-between items-center">
                        <h3 class="font-bold text-white text-sm flex items-center gap-2"><i class="fa-solid fa-basket-shopping text-emerald-400"></i> Keranjang</h3>
                        <div class="flex items-center gap-3">
                            <button onclick="clearCart()" class="text-xs text-rose-400 hover:text-rose-300 cursor-pointer"><i class="fa-solid fa-trash-can"></i></button>
                            <button onclick="toggleMobileCart()" class="lg:hidden text-gray-400 text-lg cursor-pointer"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                    </div>
                    <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-2.5">
                        <!-- Items Loaded dynamically -->
                    </div>
                    <div class="p-4 border-t border-gray-700 bg-gray-750 space-y-3">
                        <div class="flex justify-between text-white font-bold text-base pt-1">
                            <span>Total</span><span id="cart-total" class="text-emerald-400">Rp 0</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="checkout('CASH')" class="py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-xs active:scale-95 transition-all cursor-pointer"><i class="fa-solid fa-money-bill-wave mr-1"></i> Tunai</button>
                            <button onclick="checkout('QRIS')" class="py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold text-xs active:scale-95 transition-all cursor-pointer"><i class="fa-solid fa-qrcode mr-1"></i> QRIS</button>
                        </div>
                    </div>
                </div>

                <!-- Floating Cart Button for Mobile -->
                <button onclick="toggleMobileCart()" id="mobile-cart-badge" class="lg:hidden fixed bottom-20 right-4 bg-emerald-600 text-white p-4 rounded-full shadow-2xl flex items-center justify-center gap-2 z-40 active:scale-95 cursor-pointer">
                    <i class="fa-solid fa-basket-shopping text-xl"></i>
                    <span id="mobile-cart-count" class="bg-white text-emerald-700 text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
                </button>
            </section>

            <!-- VIEW 3: PRODUCTS & INVENTORY -->
            <section id="view-products" class="hidden space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-sm md:text-lg font-semibold text-white">Stok Barang</h2>
                </div>
                <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs md:text-sm text-gray-400 min-w-[500px]">
                            <thead class="bg-gray-750 text-gray-300 uppercase text-[10px] md:text-xs border-b border-gray-700">
                                <tr>
                                    <th class="py-3 px-4">Nama Barang</th>
                                    <th class="py-3 px-4">Kategori</th>
                                    <th class="py-3 px-4 text-right">Harga</th>
                                    <th class="py-3 px-4 text-center">Stok</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-table-body">
                                <!-- Loaded dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
